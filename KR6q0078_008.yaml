body:
  text: 七一舉百丈復問五峯併却咽喉唇吻作麼生道阿呵呵箭過新羅國峯云和尚也須併却攙旗奪鼓一句截流萬機寢削丈云無人處斫額望汝土曠人稀相逢者少此一則與七卷末公案同看溈山把定封疆五峯截斷衆流這些子要是箇漢當面提掇如馬前相撲不容擬議直下便用緊迅危峭不似溈山盤礴滔滔地如今禪和子只向架下行不能出他一頭地所以道欲得親切莫將問來問五峯答處當頭坐斷不妨快俊百丈云無人處斫額望汝且道是肯他是不肯他是殺是活見他阿轆轆地只與他一點雪竇頌云和尚也併却已在言前了截斷衆流龍蛇陳上看謀略須是金牙始解七事隨身慣戰作家令人長憶李將軍妙手無多子匹馬單鎗千里萬里千人萬人萬里天邊飛一鶚大衆見麼且道落在什麼處中也打云飛過去也和尚也併却雪竇於一句中拶一拶云龍蛇陳上看謀略如排兩陳突出突入七縱八橫有鬪將底手腳有大謀略底人匹馬單鎗向龍蛇陳上出沒自在爾作麼生圍繞得他若不是這箇人爭知有如此謀略雪竇此三頌皆就裏頭狀出底語如此大似李廣神箭萬里天邊飛一鶚一箭落一雕定也更不放過雪竇頌百丈問處如一鶚五峯答處如一箭相似山僧只管讚歎五峯不覺渾身入泥水了也七二舉百丈又問雲巖併却咽喉唇吻作麼生道蝦䗫窟裏出來道什麼巖云和尚有也未粘皮著骨拖泥帶水前不搆村後不迭店丈云喪我兒孫灼然有此答得半前落後雲巖在百丈二十年作侍者後同道吾至藥山山問云子在百丈會下為箇什麼事巖云透脫生死山云還透脫也未巖云渠無生死山云二十年在百丈習氣也未除巖辭去見南泉後復歸藥山方契悟看他古人二十年參究猶自半青半黃粘皮著骨不能頴脫是則也是只是前不搆村後不迭店不見道語不離窠臼焉能出蓋纏白雲橫谷口迷却幾人源洞下謂之觸破故云躍開仙仗鳳凰樓時人嫌觸當今號所以道荊棘林須是透過始得若不透過終始涉廉纖斬不斷適來道前不搆村後不迭店雲巖只管去點檢他人底百丈見他如此一時把來打殺了也雪竇頌云和尚有也未公案現成隨波逐浪和泥合水金毛獅子不踞地灼然有什麼用處可惜許兩兩三三舊路行併却咽喉唇吻作麼生道轉身吐氣腳跟下蹉過了也大雄山下空彈指一死更不再活可悲可痛蒼天中更添怨苦和尚有也未雪竇據欵結案是則是只是金毛獅子爭奈不踞地獅子捉物藏牙伏爪踞地返擲物無大小皆以全威要全其功雲巖云和尚有也未只是向舊路上行所以雪竇云百丈向大雄山下空彈指垂示云夫說法者無說無示其聽法者無聞無得說既無說無示爭如不說聽既無聞無得爭如不聽而無說又無聽却較些子只如今諸人聽山僧在這裏說作麼生免得此過具透關眼者試舉看七三舉僧問馬大師離四句絶百非請師直指某甲西來意什麼處得這話頭來那裏得這消息馬師云我今日勞倦不能為汝說問取智藏去退身三步蹉過也不知藏身露影不妨是這老漢推過與別人僧問智藏也須與他一拶蹉過也不知藏云何不問和尚草裏焦尾大蟲出來也道什麼直得草繩自縛去死十分僧云和尚教來問愛人處分前箭猶輕後箭深藏云我今日頭痛不能為汝說問取海兄去不妨是八十四員善知識一樣患這般病痛僧問海兄轉與別人抱贓叫屈海云我到這裏却不會不用忉忉從教千古萬古黑漫漫僧舉似馬大師這僧却有些子眼睛馬師云藏頭白海頭黑寰中天子敕塞外將軍令這箇公案山僧舊日在成都參真覺覺云只消看馬祖第一句自然一時理會得且道這僧是會來問不會來問此問不妨深遠離四句者有無非有非無非非有非非無離此四句絶其百非只管作道理不識話頭討頭腦不見若是山僧待馬祖道了也便與展坐具禮三拜看他作麼生道當時馬祖若見這僧來問離四句絶百非請師直指某甲西來意以拄杖劈脊便棒趕出看他省不省馬大師只管與他打葛藤以至這漢當面蹉過更令去問智藏殊不知馬大師來風深辨這僧懞懂走去問智藏藏云何不問和尚僧云和尚教來問看他這些子拶著便轉更無間暇處智藏云我今日頭痛不能為汝說得問取海兄去這僧又去問海兄海兄云我到這裏却不會且道為什麼一人道頭痛一人云不會畢竟作麼生這僧却回來舉似馬大師師云藏頭白海頭黑若以解路卜度却謂之相瞞有者道只是相推過有者道三箇總識他問頭所以不答總是拍盲地一時將古人醍醐上味著毒藥在裏許所以馬祖道待汝一口吸盡西江水即向汝道與此公案一般若會得藏頭白海頭黑便會西江水話這僧將一檐懞𢤦換得箇不安樂更勞他三人尊宿入泥入水畢竟這僧不瞥地雖然一恁麼這三箇宗師却被箇擔板漢勘破如今人只管去語言上作活計云白是明頭合黑是暗頭合只管鑽研計較殊不知古人一句截斷意根須是向正脈裏自看始得穩當所以道末後一句始到牢關把斷要津不通凡聖若論此事如當門按一口劍相似擬議則喪身失命又道譬如擲劍揮空莫論及之不及但向八面玲瓏處會取不見古人道這漆桶或云野狐精或云瞎漢且道與一棒一喝是同是別若知千差萬別只是一般自然八面受敵要會藏頭白海頭黑麼五祖先師道封后先生雪竇頌云藏頭白海頭黑半合半開一手擡一手搦金聲玉振明眼衲僧會不得更行腳三十年終是被人穿却爾鼻孔山僧故是口似匾檐馬駒踏殺天下人叢林中也須是這老漢始得放出這老漢臨濟未是白拈賊癩兒牽伴直饒好手也被人捉了也離四句絶百非道什麼也須是自點檢看阿爺似阿爹天上人間唯我知用我作什麼奪却拄杖子或若無人無我無得無失將什麼知藏頭白海頭黑且道意作麼生這些子天下衲僧跳不出看他雪竇後面合殺得好道直饒是明眼衲僧也會不得這箇些子消息謂之神仙祕訣父子不傳釋迦老子說一代時教末後單傳心印喚作金剛王寶劍喚作正位恁麼葛藤早是事不獲己古人略露些子鋒鋩若是透得底人便乃七穿八穴得大自在若透不得從前無悟入處轉說轉遠也馬駒踏殺天下人西天般若多羅讖達磨云震旦雖闊無別路要假兒孫腳下行金雞解銜一粒粟供養十方羅漢僧又六祖謂讓和尚曰向後佛法從汝邊去已後出一馬駒踏殺天下人厥後江西法嗣布於天下時號馬祖焉達磨六祖皆先讖馬祖看他作略果然別只道藏頭白海頭黑便見踏殺天下人處只這一句黑白語千人萬人咬不破臨濟未是白拈賊臨濟一日示衆云赤肉團上有一無位真人常向汝等諸人面門出入未證據者看看時有僧出問如何是無位真人臨濟下禪床搊住云道道僧無語濟托開云無位真人是什麼乾屎橛雪峯後聞云臨濟大似白拈賊雪竇要與他臨濟相見觀馬祖機鋒尤過於臨濟此正是白拈賊臨濟未是白拈賊也雪竇一時穿却了也却頌這僧道離四句絶百非天上人間唯我知且莫向鬼窟裏作活計古人云問在答處答在問處早是奇特爾作麼生離得四句絶得百非雪竇道此事唯我能知直饒三世諸佛也覷不見既是獨自箇知諸人更上來求箇什麼大溈真如拈云這僧恁麼問馬祖恁麼答離四句絶百非智藏海兄都不知要會麼不見道馬駒踏殺天下人搊初尤切拘也垂示云鏌鎁橫按鋒前剪斷葛藤窠明鏡高懸句中引出毗盧印田地穩密處著衣喫飯神通遊戲處如何湊泊還委悉麼看取下文七四舉金牛和尚每至齊時自將飯桶於僧堂前作舞呵呵大笑云菩薩子喫飯來竿頭絲線從君弄不犯清波意自殊醍醐毒藥一時行是則是七珍八寶一時羅列爭奈相逢者少雪竇云雖然如此金牛不是好心是賊識賊是精識精來說是非者便是是非人僧問長慶古人道菩薩子喫飯來意旨如何不妨疑著元來不知落處長慶道什麼慶云大似因齊慶讚相席打令據欵結案金牛乃馬祖下尊宿每至齊時自將飯桶於僧堂前作舞呵呵大笑云菩薩子喫飯來如此者二十年且道他意在什麼處若只喚作喫飯尋常敲魚擊鼓亦自告報矣又何須更自將飯桶來作許多伎倆莫是他顛麼莫是提唱建立麼若是提唱此事何不去寶華王座上敲床竪拂須要如此作什麼今人殊不知古人意在言外何不且看祖師當時初來底題目道什麼分明說道教外別傳單傳心印古人方便也只教爾直截承當去後來人妄自卜度便道那裏有許多事寒則向火熱則乘涼飢則喫飯困則打眠若恁麼以常情義解詮注達磨一宗掃土而盡不知古人向二六時中念念不捨要明此事雪竇云雖然如此金牛不是好心只這一句多少人錯會所謂醍醐上味為世所珍遇斯等人翻成毒藥金牛既是落草為人雪竇為什麼道不是好心因什麼却恁麼道衲僧家須是有生機始得今人不到古人田地只管道見什麼心有什麼佛若作這見解壞却金牛老作家了也須是子細看始得若只今日明日口快些子無有了期後來長慶上堂僧問古人道菩薩子喫飯來意旨如何慶云大似因齊慶讚尊宿家忒殺慈悲漏逗不少是則是因齊慶讚爾且道慶讚箇什麼看他雪竇頌云白雲影裏笑呵呵笑中有刀熱發作什麼天下衲僧不知落處兩手持來付與他豈有恁麼事莫謗金牛好喚作飯桶得麼若是本分衲僧不喫這般茶飯若是金毛獅子子須是他格外始得許他具眼只恐眼不正三千里外見誵訛不直半文錢一場漏逗誵訛在什麼處瞎漢白雲影裏笑呵呵長慶道因齊慶讚雪竇道兩手持來付與他且道只是與他喫飯為當別有奇特若向箇裏知得端的便是箇金毛獅子子若是金毛獅子子更不必金牛將飯桶來作舞大笑直向三千里外便知他敗缺處古人道鑒在機先不消一揑所以衲僧家尋常須是向格外用始得稱本分宗師若只據語言未免漏逗垂示云靈鋒寶劍常露現前亦能殺人亦能活人在彼在此同得同失若要提持一任提持若要平展一任平展且道不落賓主不拘回互時如何試舉看七五舉僧從定州和尚會裏來到烏臼烏臼問定州法道何似這裏言中有響要辨淺深探竿影草太殺瞞人僧云不別死漢中有活底一箇半箇鐵橛子一般踏著實地臼云若不別更轉彼中去便打灼然正令當行僧云棒頭有眼不得草草打人也是這作家始得却是獅子兒臼云今日打著一箇也又打三下說什麼一箇千箇萬箇僧便出去元來是屋裏人只得受屈只是見機而作臼云屈棒元來有人喫在啞子喫苦瓜放去又收來點得回來堪作何用僧轉身云爭奈杓柄在和尚手裏依前三百六十日却是箇伶俐衲僧臼云汝若要山僧回與汝知他阿誰是君阿誰是臣敢向虎口橫身忒殺不識好惡僧近前奪臼手中棒打臼三下也是一箇作家禪客始得賓主互換縱奪臨時臼云屈棒屈棒點這老漢著什麼死急僧云有人喫在呵呵是幾箇杓柄却在這僧手裏臼云草草打著箇漢不落丙邊知他是阿誰僧便禮拜臨危不變方是丈夫兒臼云和尚却恁麼去也點僧大笑而出作家禪客天然有在猛虎須得清風隨方知盡始盡終天下人摸素不著臼云消得恁麼消得恁麼可惜放過何不劈脊便棒將謂走到什麼處去僧從定州和尚會裏來到烏臼臼亦是作家諸人若向這裏識得此二人一出一入千箇萬箇只是一箇作主也恁麼作賓也恁麼二人畢竟合成一家一期勘辨賓主問答始終作家看烏臼問這僧云定州法道何似這裏僧便云不別當時若不是烏臼難奈這僧何臼云若不別更轉彼中去便打爭奈這僧是作家漢便云棒頭有眼不得草草打人臼一向行令云今日打著一箇也又打三下其僧便出去看他兩箇轉轆轆地俱是作家了這一事須要分緇素別休咎這僧雖出去這公案却未了在烏臼始終要驗他實處看他如何這僧却似撐門拄戶所以未見得他烏臼却云屈棒元來有人喫在這僧要轉身吐氣却不與他爭輕輕轉云爭奈杓柄在和尚手裏烏臼是頂門具眼底宗師敢向猛虎口裏橫身云汝若要山僧回與汝這漢是箇肘下有符底漢所謂見義不為無勇也更不擬議近前奪烏臼手中棒打臼三下臼云屈棒屈棒爾且道意作麼生頭上道屈棒元來有人喫在及乎到這僧打他却道屈棒屈棒僧云有人喫在臼云草草打著箇漢頭上道草草打著一箇也到末後自喫棒為什麼亦道草草打著箇漢當時若不是這僧卓朔地也不奈他何這僧便禮拜這箇禮拜最毒也不是好心若不是烏臼也識他不破烏臼云却恁麼去也其僧大笑而出烏臼云消得恁麼消得恁麼看他作家相見始終賓主分明斷而能續其實也只是互換之機他到這裏亦不道有箇互換處自是他古人絶情塵意想彼此作家亦不道有得有失雖是一期間語言兩個活鱍鱍地都有血脈針線若能於此見得亦乃向十二時中歷歷分明其僧便出是雙放已下是雙收謂之互換也雪竇正恁麼地頌出呼即易天下人總疑著臭肉引來蠅天下衲僧總不知落處遣即難不妨勦絶海上明公秀互換機鋒子細看一出一入二俱作家一條拄杖兩人扶且道在阿誰邊劫石固來猶可壞袖裏金鎚如何辨取千聖不傳滄溟深處立須乾向什麼處安排棒頭有眼獨許他親得烏臼老烏臼老可惜許這老漢不識好惡幾何般也是箇無端漢百千萬重與他杓柄太無端已在言前洎合打破蔡州好與三十棒且道過在什麼處呼即易遣即難一等是落草雪竇忒殺慈悲尋常道呼蛇易遣蛇難如今將箇瓢子吹來喚蛇即易要遣時即難一似將棒與他却易復奪他棒遣去却難須是有本分手腳方能遣得他去烏臼是作家有呼蛇底手腳亦有遣蛇底手段這僧也不是瞌睡底烏臼問定州法道何似這裏便是呼他烏臼便打是遣他僧云棒頭有眼不得草草打人却轉在這僧處便是呼來烏臼云汝若要山僧回與汝僧便近前奪棒也打三下却是這僧遣去乃至這僧大笑而出烏臼云消得恁麼消得恁麼此分明是遣得他恰好看他兩箇機鋒互換絲來線去打成一片始終賓主分明有時主却作賓有時賓却作主雪竇也讚歎不及所以道互換之機教人且子細看劫石固來猶可壞謂此劫石長四十里廣八萬四千由旬厚八萬四千由旬凡五百年乃有天人下來以六銖衣袖拂一下又去至五百年又來如此拂拂盡此石乃為一劫謂之輕衣拂石劫雪竇道劫石固來猶可壞石雖堅固尚爾可消磨盡此二人機鋒千古萬古更無有窮盡滄溟深處立須乾任是滄溟洪波浩渺白浪滔天若教此二人向內立地此滄溟也須乾竭雪竇到此一時頌了末後更道烏臼老烏臼老幾何般或擒或縱或殺或活畢竟是幾何般與他杓柄太無端這箇拄杖子三世諸佛也用歷代祖師也用宗師家也用與人抽釘拔楔解粘去縛爭得輕易分付與人雪竇意要獨用賴值這僧當時只與他平展忽若旱地起雷看他如何當抵烏臼過杓柄與人去豈不是太無端垂示云細如米末冷似氷霜畐塞乾坤離明絶暗低低處觀之有餘高高處平之不足把住放行總在這裏許還有出身處也無試舉看畐拍逼切滿也七六舉丹霞問僧甚處來正是不可總沒來處也要知來處也不難僧云山下來著草鞋入爾肚裏過也只是不會言中有響諳含來知他是黃是緑霞云喫飯了也未第一杓惡水澆何必定盤星要知端的僧云喫飯了果然撞著箇露柱却被旁人穿却鼻孔元來是箇無孔鐵鎚霞云將飯來與汝喫底人還具眼麼雖然是倚勢欺人也是據欵結案當時好掀倒禪床無端作什麼僧無語果然走不得這僧若是作家向他道與和尚眼一般長慶問保福將飯與人喫報恩有分為什麼不具眼也只道得一半通身是遍身是一刀兩段一手擡一手搦福云施者受者二俱瞎漢據令而行一句道盡罕遇其人長慶云盡其機來還成瞎否識甚好惡猶自未肯討什麼碗福云道我瞎得麼兩箇俱是草裏漢龍頭蛇尾當時待他道盡其機來還成瞎否只向他道瞎也只道得一半一等是作家為什麼前不搆村後不迭店鄧州丹霞天然禪師不知何許人初習儒學將入長安應舉方宿於逆旅忽夢白光滿室占者曰解空之祥偶一禪客問曰仁者何往曰選官去禪客曰選官何如選佛霞云選佛當往何所禪客曰今江西馬大師出世是選佛之場仁者可往遂直造江西才見馬大師以兩手托幞頭腳馬師顧視云吾非汝師南嶽石頭處去遽抵南嶽還以前意投之石頭云著槽廠去師禮謝入行者堂隨衆作務凡三年石頭一日告衆云來日剗佛殿前草至來日大衆各備鍬鋤剗草丹霞獨以盆盛水淨頭於師前跪膝石頭見而笑之便與剃髮又為說戒丹霞掩耳而出便往江西再謁馬祖未參禮便去僧堂內騎聖僧頸而坐時大衆驚愕急報馬祖祖躬入堂視之曰我子天然霞便下禮拜曰謝師賜法號因名天然他古人天然如此頴脫所謂選官不如選佛也傳燈録中載其語句直是壁立千仞句句有與人抽釘拔楔底手腳似問這僧道什麼處來僧云山下來這僧却不通來處一如具眼倒去勘主家相似當時若不是丹霞也難為收拾丹霞却云喫飯了也未頭邊總未見得此是第二回勘他僧云喫飯了也懵𢤦漢元來不會霞云將飯與汝喫底人還具眼麼僧無語丹霞意道與爾這般漢飯喫堪作什麼這僧若是箇漢試與他一劄看他如何雖然如是丹霞也未放爾在這僧便眼眨眨地無語保福長慶同在雪峯會下常舉古人公案商量長慶問保福將飯與人喫報恩有分為什麼不具眼不必盡問公案中事大綱借此語作話頭要驗他諦當處保福云施者受者二俱瞎漢快哉到這裏只論當機事家裏有出身之路長慶云盡其機來還成瞎否保福云道我瞎得麼保福意謂我恁麼具眼與爾道了也還道我瞎得麼雖然如是半合半開當時若是山僧等他道盡其機來還成瞎否只向他道瞎可惜許保福當時若下得這箇瞎字免得雪竇許多葛藤雪竇亦只用此意頌盡機不成瞎只道得一半也要驗他過言猶在耳按牛頭喫草失錢遭罪半河南半河北殊不知傷鋒犯手四七二三諸祖師有條攀條帶纍先聖不唯只帶纍一人寶器持來成過咎盡大地人換手捶胸還我拄杖來帶纍山僧也出頭不得過咎深可殺深天下衲僧跳不出且道深多少無處尋在爾腳跟下摸索不著天上人間同陸沈天下衲僧一坑埋却還有活底人麼放過一著蒼天蒼天廠齒兩切馬屋無壁也眨側洽切目動也盡機不成瞎長慶云盡其機來還成瞎否保福云道我瞎得麼一似按牛頭喫草須是等他自喫始得那裏按他頭教喫雪竇恁麼頌自然見得丹霞意四七二三諸祖師寶器持來成過咎不唯只帶纍長慶乃至西天二十八祖此土六祖一時埋沒釋迦老子四十九年說一大藏教末後唯傳這箇寶器永嘉道不是標形虛事褫如來寶杖親蹤跡若作保福見解寶器持來都成過咎過咎深無處尋這箇與爾說不得但去靜坐向他句中點檢看既是過咎深因什麼却無處尋此非小過也將祖師大事一齊於陸地上平沈却所以雪竇道天上人間同陸沈垂示云向上轉去可以穿天下人鼻孔似鶻捉鳩向下轉去自己鼻孔在別人手裏如龜藏殼箇中忽有箇出來道本來無向上向下用轉作什麼只向伊道我也知爾向鬼窟裏作活計且道作麼生辨箇緇素良久云有條攀條無條攀例試舉看七七舉僧問雲門如何是超佛越祖之談開旱地忽雷拶門云糊餅舌拄上齶過也這僧問雲門如何是超佛越祖之談門云糊餅還覺寒毛卓竪麼衲僧家問佛問祖問禪問道問向上向下了更無可得問却致箇問端問超佛越祖之談雲門是作家便水長船高泥多佛大便答道糊餅可謂道不虛行功不浪施雲門復示衆云爾勿可作了見人道著祖師意便問超佛越祖之談道理爾且喚什麼作佛喚什麼作祖即說超佛越祖之談便問箇出三界爾把三界來看有什麼見聞覺知隔礙著爾有什麼聲色佛法與汝可了了箇什麼碗以那箇為差殊之見他古聖勿奈爾何橫身為物道箇舉體全真物物覿體不可得我向汝道直下有什麼事早是埋沒了也會得此語便識得糊餅五祖云驢屎比麝香所謂直截根源佛所印摘葉尋枝我不能到這裏欲得親切莫將問來問看這僧問如何是超佛越祖之談門云糊餅還識羞慚麼還覺漏逗麼有一般人杜撰道雲門見兔放鷹便道糊餅若恁麼將糊餅便是超佛越祖之談見去豈有活路莫作糊餅會又不作超佛越祖會便是活路也與麻三斤解打鼓一般雖然只道糊餅其實難見後人多作道理云麁言及細語皆歸第一義若恁麼會且去作座主一生贏得多知多解如今禪和子道超佛越祖之時諸佛也踏在腳跟下祖師也踏在腳跟下所以雲門只向他道糊餅既是糊餅豈解超佛越祖試去參詳看諸方頌極多盡向問頭邊作言語唯雪竇頌得最好試舉看頌云超談禪客問偏多箇箇出來便作這般見解如麻似粟縫罅披離見也麼已在言前開也自屎不覺臭糊餅𡎺來猶不住將木槵子換却爾眼睛了也至今天下有誵訛畫箇圓相云莫是恁麼會麼咬人言語有甚了期大地茫茫愁殺人便打𡎺仄六切塞也超談禪客問偏多此語禪和家偏愛問不見雲門道爾諸人橫擔拄杖道我參禪學道便覓箇超佛越祖道理我且問爾十二時中行住坐臥屙屎放尿至於茅坑裏蟲子市肆買賣羊肉案頭還有超佛越祖底道理麼道得底出來若無莫妨我東行西行便下座有者更不識好惡作圓相土上加泥添枷帶鎖縫罅披離見也麼他致問處有大小大縫罅雲門見他問處披離所以將糊餅攔縫塞定這僧猶自不肯住却更問是故雪竇道糊餅𡎺來猶不住至今天下有誵訛如今禪和子只管去糊餅上解會不然去超佛越祖處作道理既不在這兩頭畢竟在什麼處三十年後待山僧換骨出來却向爾道七八舉古有十六開士成群作隊有什麼用處這一隊不唧𠺕漢於浴僧時隨例入浴撞著露柱漆桶作什麼忽悟水因惡水驀頭澆諸禪德作麼生會他道妙觸宣明更不干別人事作麼生會他撲落非他物成佛子住天下衲僧到這裏摸索不著兩頭三而作什麼也須七穿八穴始得一棒一條痕莫辜負山僧好撞著磕著還曾見德山臨濟麼楞嚴會上跋陀婆羅菩薩與十六開士各修梵行乃各說所證圓通法門之因此亦二十五圓通之一數也他因浴僧時隨例入浴忽悟水因云既不洗塵亦不洗體且道洗箇什麼若會得去中間安然得無所有千箇萬箇更近傍不得所謂以無所得是真般若若有所得是相似般若不見達磨謂二祖云將心來與汝安二祖云覓心了不可得這裏些子是衲僧性命根本更總不消得如許多葛藤只消道箇忽悟水因自然了當既不洗塵亦不洗體且道悟箇什麼到這般田地一點也著不得道箇佛字也須諱却他道妙觸宣明成佛子住宣則是顯也妙觸是明也既悟妙觸成佛子住即住佛地也如今人亦入浴亦洗水也恁麼觸因甚却不悟皆被塵境惑障粘皮著骨所以不能便惺惺去若向這裏洗亦無所得觸亦無所得水因亦無所得且道是妙觸宣明不是妙觸宣明若向箇裏直下見得便是妙觸宣明成佛子住如今人亦觸還見妙處麼妙觸非常觸與觸者合則為觸離則非也玄沙過嶺磕著腳指頭以至德山棒豈不是妙觸雖然恁麼也須是七穿八穴始得若只向身上摸索有什麼交涉爾若七穿八穴去何須入浴便於一毫端上現寶王剎向微塵裏轉大法輪一處透得千處萬處一時透莫只守一窠一窟一切處都是觀音入理之門古人亦有聞聲悟道見色明心若一人悟去則故是因甚十六開士同時悟去是故古人同修同證同悟同解雪竇拈他教意令人去妙觸處會取出他教眼頌免得人去教網裏籠罩半醉半醒要令人直下灑灑落落頌云了事衲僧消一箇現有一箇朝打三千暮打八百跳出金剛圈一箇也不消得長連床上展腳臥果然是箇瞌睡漢論劫不論禪夢中曾說悟圓通早是瞌睡更說夢却許爾夢見寐語作什麼香水洗來驀面唾咄土上加泥又一重莫來淨地上屙了事衲僧消一箇且道了得箇什麼事作家禪客聊聞舉著剔起便行似恁麼衲僧只消得一箇何用成群作隊長連床上展腳臥古人道明明無悟法悟了却迷人長舒兩腳睡無僞亦無真所以胸中無一事飢來喫飯困來眠雪竇意道爾若說入浴悟得妙觸宣明在這般無事衲僧分上只似夢中說夢所以道夢中曾說悟圓通香水洗來驀面唾似恁麼只是惡水驀頭澆更說箇什麼圓通雪竇道似這般漢正好驀頭驀面唾山僧道土上加泥又一重垂示云大用現前不存軌則活捉生擒不勞餘力且道是什麼人曾恁麼來試舉看七九舉僧問投子一切聲是佛聲是否也解捋虎鬚青天轟霹靂自屎不覺臭投子云是賺殺一船人賣身與爾了也拈放一邊是什麼心行僧云和尚莫㞘沸碗鳴聲只見錐頭利不見鑿頭方道什麼果然納敗缺投子便打著好打放過則不可又問麁言及細語皆歸第一義是否第二回捋虎鬚抱贓叫屈作什麼東西南北猶有影響在投子云是又是賣身與爾了也陷虎之機也是什麼心行僧云喚和尚作一頭驢得麼只見錐頭利不見鑿頭方雖有逆水之波只是頭上無角含血噀人投子便打著不可放過好打拄杖未到折因什麼便休去㞘都木切臀也投子朴實頭得逸群之辨凡有致問開口便見膽不費餘力便坐斷他舌頭可謂運籌帷幄之中決勝千里之外這僧將聲色佛法見解貼在他額頭上逢人便問投子作家來風深辨這僧知投子實頭合下做箇圈繢子教投子入來所以有後語投子却使陷虎之機釣他後語出來這僧接他答處道和尚莫㞘沸碗鳴聲果然一釣便上若是別人則不奈這僧何投子具眼隨後便打咬猪狗底手腳須還作家始得左轉也隨他阿轆轆地右轉也隨他阿轆轆地這僧既是做箇圈繢子要來捋虎鬚殊不知投子更在他圈繢頭上投子便打這僧可惜許有頭無尾當時等他拈棒便與掀倒禪床直饒投子全機也須倒退三千里又問麁言及細語皆歸第一義是否投子亦云是一似前頭語無異僧云喚和尚作一頭驢得麼投子又打這僧雖然作窠窟也不妨奇特若是曲彔木床上老漢頂門無眼也難折挫他投子有轉身處這僧既做箇道理要攙他行市到了依舊不奈投子老漢何不見巖頭道若論戰也箇箇立在轉處投子放去太遲收來太急這僧當時若解轉身吐氣豈不作得箇口似血盆底漢衲僧家一不做二不休這僧既不能返擲却被投子穿了鼻孔頌云投子投子灼然天下無這實頭老漢教壞人家男女機輪無阻有什麼奈何他處也有些子放一得二換却爾眼睛什麼處見投子同彼同此恁麼來也喫棒不恁麼來也喫棒闍黎替他便打可憐無限弄潮人叢林中放出一箇半箇放出這兩箇漢天下衲僧要恁麼去畢竟還落潮中死可惜許爭奈出這圈繢不得愁人莫向愁人說忽然活禪床震動驚殺山僧也倒退三千里百川倒流閙𣽅𣽅嶮徒勞佇思山僧不敢開口投子老漢也須是拗折拄杖始得𣽅古活切水流聲投子投子機輪無阻投子尋常道爾總道投子實頭忽然下山三步有人問爾道如何是投子實頭處爾作麼生抵對古人道機輪轉處作者猶迷他機輪轉轆轆地全無阻隔所以雪竇道放一得二不見僧問如何是佛投子云佛又問如何是道投子云道又問如何是禪投子云禪又問月未圓時如何投子云吞却三箇四箇圓後如何吐却七箇八箇投子接人常用此機答這僧只是一箇是字這僧兩回被打所以雪竇道同彼同此四句一時頌投子了也末後頌這僧道可憐無限弄潮人這僧敢攙旗奪鼓道和尚莫㞘沸碗鳴聲又道喚和尚作一頭驢得麼此便是弄潮處這僧做盡伎倆依前死在投子句中投子便打此僧便是畢竟還落潮中死雪竇出這僧云忽然活便與掀倒禪床投子也須倒退三千里直得百川倒流閙𣽅𣽅非唯禪床震動亦乃山川岌崿天地陡暗苟或箇箇如此山僧且打退鼓諸人向什麼處安身立命岌逆及切崿逆各切八舉僧問趙州初生孩子還具六識也無閃電之機說什麼初生孩兒子趙州云急水上打毬子過也俊鷂趁不及也要驗過僧復問投子急水上打毬子意旨如何也是作家同驗過還會麼過也子云念念不停流打葛藤漢此六識教家立為正本山河大地日月星辰因其所以生來為先鋒去為殿後古人道三界唯心萬法唯識若證佛地以八識轉為四智教家謂之改名不改體根塵識是三前塵元不會分別勝義根能發生識識能顯色分別即是第六意識第七識末那識能去執持世間一切影事令人煩惱不得自由自在皆是第七識到第八識亦謂之阿賴耶識亦謂之含藏識含藏一切善惡種子這僧知教意故將來問趙州道初生孩子還具六識也無初生孩兒雖具六識眼能見耳能聞然未曾分別六塵好惡長短是非得失他恁麼時總不知學道之人要復如嬰孩榮辱功名逆情順境都動他不得眼見色與盲等耳聞聲與聾等如癡似兀其心不動如須彌山這箇是衲僧家真實得力處古人道衲被蒙頭萬事休此時山僧都不會若能如此方有少分相應雖然如此爭奈一點也瞞他不得山依舊是山水依舊是水無造作無緣慮如日月運於太虛未嘗暫止亦不道我有許多名相如天普蓋似地普擎為無心故所以長養萬物亦不道我有許多功行天地為無心故所以長久若有心則有限齊得道之人亦復如是於無功用中施功用一切違情順境皆以慈心攝受到這裏古人尚自呵責道了了了時無可了玄玄玄處直須呵又道事事通兮物物明達者聞之暗裏驚又云入聖超凡不作聲臥龍長怖碧潭清人生若得長如此大地那能留一名然雖恁麼更須跳出窠窟始得豈不見教中道第八不動地菩薩以無功用智於一微塵中轉大法輪於一切時中行住坐臥不拘得失任運流入薩婆若海衲僧家到這裏亦不可執著但隨時自在遇茶喫茶遇飯喫飯這箇向上事著箇定字也不得著箇不定字也不得石室善道和尚示衆云汝不見小兒出胎時何曾道我會看教當恁麼時亦不知有佛性義無佛性義及至長大便學種種知解出來便道我能我解不知是客塵煩惱十六觀行中嬰兒行為最哆哆啝啝時喻學道之人離分別取捨心故讚歎嬰兒可況喻取之若謂嬰兒是道今時人錯會南泉云我十八上解作活計趙州道我十八上解破家散宅又道我在南方二十年除粥飯二時是雜用心處曹山問僧菩薩定中聞香象渡河歷歷地出什麼經僧云涅槃經山云定前聞定後聞僧云和尚流也山云灘下接取又楞嚴經云湛入合湛入識邊際又楞伽經云相生執礙想生妄想流注生則逐妄流轉若到無功用地猶在流注相中須是出得第三流注生相方始快活自在所以溈山問仰山云寂子如何仰山云和尚問他見解問他行解若問他行解某甲不知若是見解如一瓶水注一鉼水若得如此皆可以為一方之師趙州云急水上打毬子早是轉轆轆地更向急水上打時眨眼便過譬如楞嚴經云如急流水望為恬靜古人云譬如駛流水水流無定止各各不相知諸法亦如是趙州答處意渾類此其僧又問投子急水上打毬子意旨如何子云念念不停流自然與他問處恰好古人行履綿密答得只似一箇更不消計較爾才問他早知爾落處了也孩子六識雖然無功用爭奈念念不停如密水流投子恁麼答可謂深辨來風雪竇頌云駛音史疾也六識無功伸一問有眼如盲有耳如聾明鏡當臺明珠在掌一句道盡作家曾共辨來端何必也要辨箇緇素唯證乃知茫茫急水打毬子始終一貫過也道什麼落處不停誰解看看即瞎過也灘下接取六識無功伸一問古人學道養到這裏謂之無功之功與嬰兒一般雖有眼耳鼻舌身意而不能分別六塵蓋無功用也既到這般田地便乃降龍伏虎坐脫立亡如今人但將目前萬境一時歇却何必八地以上方乃如是雖然無功用處依舊山是山水是水雪竇前面頌云活中有眼還同死藥忌何須鑒作家蓋為趙州投子是作家故云作家曾共辨來端茫茫急水打毬子投子道念念不停流諸人還知落處麼雪竇末後教人自著眼看是故云落處不停誰解看此是雪竇活句且道落在什麼處
