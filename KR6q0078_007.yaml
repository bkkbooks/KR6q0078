body:
  text: 垂示云建法幢立宗旨還他本分宗師定龍蛇別緇素須是作家知識劍刃上論殺活棒頭上別機宜則且置且道獨據寰中事一句作麼生商量試舉看六一舉風穴垂語云興雲致雨也要為主為賓若立一塵我為法王於法自在花簇簇錦簇簇家國興盛不是他屋裏事不立一塵掃蹤滅迹失却眼睛和鼻孔失也家國喪亡一切處光明用家國作什麼全是他家屋裏事雪竇拈拄杖云須是壁立千仞始得達磨來也還有同生同死底衲僧麼還我話頭來雖然如是要平不平之事須於雪竇商量始得還知麼若知許爾自由自在若不知朝打三千暮打八百只如風穴示衆云若立一塵家國興盛不立一塵家國喪亡且道立一塵即是不立一塵即是到這裏須是大用現前始得所以道設使言前薦得猶是滯殼迷封直饒句下精通未免觸途狂見他是臨濟下尊宿直下用本分草料若立一塵家國興盛野老顰蹙意在立國安邦須藉謀臣猛將然後麒麟出鳳凰翔乃太平之祥瑞也他三家村裏人爭知有恁麼事不立一塵家國喪亡風颯颯地野老為什麼出來謳歌只為家國喪亡洞下謂之轉變處更無佛無衆生無是無非無好無惡絶音響蹤迹所以道金屑雖貴落眼成翳又云金屑眼中翳衣珠法上塵己靈猶不重佛祖是何人七穿八穴神通妙用不為奇特到箇裏衲被蒙頭萬事休此時山僧都不會若更説心説性説玄説妙都用不著何故他家自有神仙境南泉示衆云黃梅七百高僧盡是會佛法底人不得他衣鉢唯有盧行者不會佛法所以得他衣鉢又云三世諸佛不知有狸奴白牯却知有野老或顰蹙或謳歌且道作麼生會且道他具什麼眼却恁麼須知野老門前別有條章雪竇雙拈了却拈拄杖云還有同生同死底衲僧麼當時若有箇漢出來道得一句互為賓主免得雪竇這老漢後面自點胸野老從教不展眉三千里外有箇人美食不中飽人喫且圖家國立雄基太平一曲大家知要行即行要住即住盡乾坤大地是箇解脫門爾作麼生立謀臣猛將今何在有麼有麼土曠人稀相逢者少且莫點𮌎萬里清風只自知旁若無人教誰掃地也是雲居羅漢適來雙提了也這裏却只拈一邊放一邊裁長補短捨重從輕所以道野老從教不展眉我且圖家國立雄基謀臣猛將今何在雪竇拈拄杖云還有同生同死底衲僧麼一似道還有謀臣猛將麼一口吞却一切人了也所以道土曠人稀相逢者少還有相知者麼出來一坑埋却萬里清風只自知便是雪竇點胸處也垂示云以無師智發無作妙用以無緣慈作不請勝友向一句下有殺有活於一機中有縱有擒且道什麼人曾恁麼來試舉看六二舉雲門示衆云乾坤之內土曠人稀六合收不得宇宙之間休向鬼窟裏作活計蹉過了也中有一寶在什麼處光生也切忌向鬼窟裏覓祕在形山拶點拈燈籠向佛殿裏猶可商量將三門來燈籠上雲門大師是即是不妨誵訛猶較些子若子細撿點將來未免屎臭氣雲門道乾坤之內宇宙之間中有一寶祕在形山且道雲門意在釣竿頭意在燈籠上此乃肇法師寶藏論數句雲門拈來示衆肇公時於後秦逍遙園造論寫維摩經方知莊老未盡其妙肇乃禮羅什為師又參瓦棺寺跋陀婆羅菩薩從西天二十七祖處傳心印來肇深造其堂奧肇一日遭難臨刑之時乞七日假造寶藏論雲門便拈論中四句示衆大意云如何以無價之寶隱在陰界之中論中語言皆與宗門説話相符合不見鏡清問曹山清虛之理畢竟無身時如何山云理即如是事作麼生清云如理如事山云瞞曹山一人即得爭奈諸聖眼何清云若無諸聖眼爭知不恁麼山云官不容針私通車馬所以道乾坤之內宇宙之間中有一寶祕在形山大意明人人具足箇箇圓成雲門便拈來示衆已是十分現成不可更似座主相似與爾注解去他慈悲更與爾下注腳道拈燈籠向佛殿裏將三門來燈籠上且道雲門恁麼道意作麼生不見古人云無明實性即佛性幻化空身即法身又云即凡心而見佛心形山即是四大五蘊也中有一寶祕在形山所以道諸佛在心頭迷人向外求內懷無價寶不識一生休又道佛性堂堂顯現住相有情難見若悟衆生無我我面何殊佛面心是本來心面是娘生面劫石可移動箇中無改變有者只認箇昭昭靈靈為寶只是不得其用亦不得其妙所以動轉不得開撥不行古人道窮則變變則通拈燈籠向佛殿裏若是常情可測度得將三門來燈籠上還測度得麼雲門與爾一時打破情識意想得失是非了也雪竇道我愛韶陽新定機一生與人抽釘拔楔又云曲木據位知幾何利刃剪却令人愛他道拈燈籠向佛殿裏這一句已截斷了也又將三門來燈籠上若論此事如擊石火似閃電光雲門道汝若相當去且覓箇入路微塵諸佛在爾腳跟下三藏聖教在爾舌頭上不如悟去好和尚子莫妄想天是天地是地山是山水是水僧是僧俗是俗良久云與我拈面前按山來看便有僧出問云學人見山是山水是水時如何門云三門為什麼從這裏過恐爾死却遂以手劃一劃云識得時是醍醐上味若識不得反為毒藥也所以道了了了時無可了玄玄玄處直須呵雪竇又拈云乾坤之內宇宙之間中有一寶祕在形山挂在壁上達磨九年不敢正眼覷著而今衲僧要見劈脊便棒看他本分宗師終不將實法繫綴人玄沙云羅籠不肯住呼喚不回頭雖然恁麼也是靈龜曳尾雪竇頌云看看高著眼用看作什麼驪龍玩珠古岸何人把釣竿孤危甚孤危壁立甚壁立賊過後張弓腦後見腮莫與往來雲冉冉打斷始得百匝千重炙脂帽子鶻臭布衫水漫漫左之右之前遮後擁明月蘆花君自看看著則瞎若識得雲門語便見雪竇末後句若識得雲門語便見雪竇為人處他向雲門示衆後面兩句便與爾下箇注腳云看看爾便作瞪眉瞪眼會且得沒交涉古人道靈光獨耀逈脫根塵體露真常不拘文字心性無染本自圓成但離妄緣即如如佛若只向瞪眉努眼處坐殺豈能脫得根塵雪竇道看看雲門如在古岸把釣竿相似雲又冉冉水又漫漫明月映蘆花蘆花映明月正當恁麼時且道是何境界若便直下見得前後只是一句相似瞪抽庚切直視也垂示云意路不到正好提撕言詮不及宜急著眼若也電轉星飛便可傾湫倒嶽衆中莫有辨得底麼試舉看六三舉南泉一日東西兩堂爭貓兒不是今日合閙也一場漏逗南泉見遂提起云道得即不斬正令當行十方坐斷這老漢有定龍蛇手腳衆無對可惜放過一隊漆桶堪作什麼杜撰禪和如麻似粟泉斬貓兒為兩段快哉快哉若不如此盡是弄泥團漢賊過後張弓已是第二頭未舉起時好打宗師家看他一動一靜一出一入且道意旨如何這斬貓兒話天下叢林商量浩浩地有者道提起處便是有底道在斬處且得都沒交涉他若不提起時亦匝匝地作盡道理殊不知他古人有定乾坤底眼有定乾坤底劍爾且道畢竟是誰斬貓兒只如南泉提起云道得即不斬當時忽有人道得且道南泉斬不斬所以道正令當行十方坐斷出頭天外看誰是箇中人其實當時元不斬此話亦不在斬與不斬處此事軒知如此分明不在情塵意見上討若向情塵意見上討則辜負南泉去但向當鋒劍刃上看是有也得無也得不有不無也得所以古人道窮則變變則通而今人不解變通只管向語句上走南泉恁麼提起不可教人合下得甚語只要教人自薦各各自用自知若不恁麼會卒摸索不著雪竇當頭頌云兩堂俱是杜禪和親言出親口一句道斷據欵結案撥動煙塵不奈何看爾作什麼折合現成公案也有些子賴得南泉能舉令舉拂子云一似這箇王老師猶較些子好箇金剛王寶劍用切泥去也一刀兩段任偏頗百雜碎忽有人按住刀看他作什麼不可放過也便打頗普禾切偏也音坡兩堂俱是杜禪和雪竇不向句下死亦不認驢前馬後有撥轉處便道撥動煙塵不奈何雪竇與南泉把手共行一句説了也兩堂首座沒歇頭處到處只管撥動煙塵奈何不得賴得南泉與他斷這公案收得淨盡他爭奈前不搆村後不迭店所以道賴得南泉能舉令一刀兩段任偏頗直下一刀兩段更不管有偏頗且道南泉據什麼令六四舉南泉復舉前話問趙州也須是同心同意始得同道者方知州便脫草鞋於頭上戴出不免拖泥帶水南泉云子若在恰救得貓兒唱拍相隨知音者少將錯就錯趙州乃南泉的子道頭會尾舉著便知落處南泉晚間復舉前話問趙州州是老作家便脫草鞋於頭上戴出泉云子若在却救得貓兒且道真箇恁麼不恁麼南泉云道得即不斬如擊石火似閃電光趙州便脫草鞋於頭上戴出他參活句不參死句日日新時時新千聖移易一絲毫不得須是運出自己家珍方見他全機大用他道我為法王於法自在人多錯會道趙州權將草鞋作貓兒有者道待他云道得即不斬便戴草鞋出去自是爾斬貓兒不干我事且得沒交涉只是弄精魂殊不知古人意如天普蓋似地普擎他父子相投機鋒相合那箇舉頭他便會尾如今學者不識古人轉處空去意路上卜度若要見但去他南泉趙州轉處便見好頌云公案圓來問趙州言猶在耳不消更斬喪車背後懸藥袋長安城裏任間遊得恁麼快活得恁麼自在信手拈來草不可不教爾恁麼去也草鞋頭戴無人會也有一箇半箇別是一家風明頭也合暗頭也合歸到家山即便休腳跟下好與三十棒且道過在什麼處只為爾無風起浪彼此放下只恐不恁麼恁麼也太奇𡎺側六切塞也磕克盍切石聲同音榼公案圓來問趙州慶藏主道如人結案相似八棒是八棒十三是十三已斷了也却拈來問趙州州是他屋裏人會南泉意旨他是透徹底人𡎺著磕著便轉具本分作家眼腦才聞舉著剔起便行雪竇道長安城裏任間遊漏逗不少古人道長安雖樂不是久居又云長安甚閙我國晏然也須是識機宜別休咎始得草鞋頭戴無人會戴草鞋處這些子雖無許多事所以道唯我能知唯我能證方見得南泉趙州雪竇同得同用處且道而今作麼生會歸到家山即便休什麼處是家山他若不會必不恁麼道他既會且道家山在什麼處便打垂示云無相而形充十虛而方廣無心而應遍剎海而不煩舉一明三目機銖兩直得棒如雨點喝似雷奔也未當得向上人行履在且道作麼生是向上人事試舉六五舉外道問佛不問有言不問無言雖然如是屋裏人也有些子香氣雙劍倚空飛賴是不問世尊良久莫謗世尊其聲如雷坐者立者皆動他不得外道讚歎云世尊大慈大悲開我迷雲令我得入伶俐漢一撥便轉盤裏明珠外道去後阿難問佛外道有何所證而言得入不妨令入疑著也要大家知錮鐪著生鐵佛云如世良馬見鞭影而行且道喚什麼作鞭影打一拂子棒頭有眼明如日要識真金火裏看拾得口喫飯此事若在言句上三乘十二分教豈是無言句或道無言便是又何消祖師西來作什麼只如從上來許多公案畢竟如何見其下落這一則公案話會者不少有底喚作良久有底喚作據坐有底喚作默然不對且喜沒交涉幾曾摸索得著來此事其實不在言句上亦不離言句中若稍有擬議則千里萬里去也看他外道省悟後方知亦不在此亦不在彼亦不在是亦不在不是且道是箇什麼天衣懷和尚頌云維摩不默不良久據坐商量成過咎吹毛匣裏冷光寒外道天魔皆拱手百丈常和尚參法眼眼令看此話法眼一日問爾看什麼因緣常云外道問佛話眼云爾試舉看常擬開口眼云住住爾擬向良久處會那常於言下忽然大悟後示衆云百丈有三訣喫茶珍重歇擬議更思量知君猶未徹翠巖真點胸拈云六合九有青黃赤白一一交羅外道會四維陀典論自云我是一切智人在處索人論議他致問端要坐斷釋迦老子舌頭世尊不費纖毫氣力他便省去讚歎云世尊大慈大悲開我迷雲令我得入且道作麼生是大慈大悲處世尊隻眼通三世外道雙眸貫五天溈山真如拈云外道懷藏至寶世尊親為高提森羅顯現萬象歷然且畢竟外道悟箇什麼如趁狗逼牆至極則無路處他須回來便乃活鱍鱍地若計較是非一時放下情盡見除自然徹底分明外道去後阿難問佛云外道有何所證而言得入佛云如世良馬見鞭影而行後來諸方便道又被風吹別調中又云龍頭蛇尾什麼處是世尊鞭影什麼處是見鞭影處雪竇云邪正不分過由鞭影真如云阿難金鐘再擊四衆共聞雖然如是大似二龍爭珠長他智者威獰雪竇頌云機輪曾未轉在這裏果然不動一絲毫轉必兩頭走不落有必落無不東則西左眼半斤右眼八兩明鏡忽臨臺還見釋迦老子麼一撥便轉破也破也敗也敗也當下分妍醜盡大地是箇解脫門好與三十棒還見釋迦老子麼妍醜分兮迷雲開放一線道許爾有箇轉身處爭奈只是箇外道慈門何處生塵埃遍界不曾藏退後退後達磨來也因思良馬窺鞭影我有拄杖子不消爾與我且道什麼處是鞭影處什麼處是良馬處千里追風喚得回騎佛殿出三門去也轉身即錯放過即不可便打喚得回鳴指三下前不搆村後不迭店拗折拄杖子向什麼處去雪竇雷聲甚大雨點全無機輪曾未轉轉必兩頭走機乃千聖靈機輪是從本已來諸人命脈不見古人道千聖靈機不易親龍生龍子莫因循趙州奪得連城璧秦王相如總喪身外道却是把得住作得主未嘗動著何故他道不問有言不問無言豈不是全機處世尊會看風使帆應病與藥所以良久全機提起外道全體會去機輪便阿轆轆地轉亦不轉向有亦不轉向無不落得失不拘凡聖二邊一時坐斷世尊才良久他便禮拜如今人多落在無不然落在有只管在有無處兩頭走雪竇道明鏡忽臨臺當下分妍醜這箇不曾動著只消箇良久如明鏡臨臺相似萬象不能逃其形質外道云世尊大慈大悲開我迷雲令我得入且道是什麼處是外道入處到這裏須是箇箇自參自究自悟自會始得便於一切處行住坐臥不問高低一時現成更不移易一絲毫才作計較有一絲毫道理即礙塞殺人更無入作分也後面頌世尊大慈大悲開我迷雲令我得入當下忽然分妍醜妍醜分兮迷雲開慈門何處生塵埃盡大地是世尊大慈大悲門戶爾若透得不消一揑此亦是放開底門戶不見世尊於三七日中思惟如是事我寧不説法疾入於涅槃因思良馬窺鞭影千里追風喚得回追風之馬見鞭影而便過千里教回即回雪竇意賞他道若得俊流方可一撥便轉一喚便回若喚得回便鳴指三下且道是點破是撒沙垂示云當機覿面提陷虎之機正按傍提布擒賊之略明合暗合雙放雙收解弄死蛇還他作者六六舉巖頭問僧什麼處來未開口時納敗缺了也穿過髑髏要知來處也不難僧云西京來果然一箇小賊頭云黃巢過後還收得劍麼平生不曾做草賊不懼頭落便恁麼問好大膽僧云收得敗也未識轉身處茅廣漢如麻似粟巖頭引頸近前云㘞也須識機宜始得陷虎之機是什麼心行僧云師頭落也只見錐頭利不見鑿頭方識甚好惡著也巖頭呵呵大笑盡天下衲僧不奈何欺殺天下人尋這老漢頭落處不得僧後到雪峯依前顢頇懞懂這僧往往十分納敗缺去峯問什麼處來不可不説來處也要勘過僧云巖頭來果然納敗缺峯云有何言句舉得不免喫棒僧舉前話便好趕出雪峯打三十棒趕出雖然斬釘截鐵因甚只打三十棒拄杖子也未到折在且未是本分何故朝打三千暮打八百若不是同參爭辨端的雖然如是且道雪峯巖頭落在什麼處大凡挑囊負鉢撥草瞻風也須是具行腳眼始得這僧眼似流星也被巖頭勘破了一串穿却當時若是箇漢或殺或活舉著便用這僧砑郎當却道收得似恁麼行腳閻羅老子問爾索飯錢在知他踏破多少草鞋直到雪峯當時若有些子眼筋便解瞥地去豈不快哉這箇因緣有節角誵訛處此事雖然無得失得失甚大雖然無揀擇到這裏却要具眼揀擇看他龍牙行腳時致箇問端問德山學人仗鏌鎁劍擬取師頭時如何德山引頸近前云㘞龍牙云師頭落也山便歸方丈牙後舉似洞山洞山云德山當時道什麼牙云他無語洞山云他無語則且置借我德山落底頭來看牙於言下大悟遂焚香遙望德山禮拜懺悔有僧傳到德山處德山云洞山老漢不識好惡這漢死來多少時也救得有什麼用處這箇公案與龍牙底一般德山歸方丈則暗中最妙巖頭大笑他笑中有毒若有人辨得天下橫行這僧當時若辨得出千古之下免得檢責於巖頭門下已是一場蹉過看他雪峯老人是同參便知落處也不與他説破只打三十棒趕出院可以光前絶後這箇是拈作家衲僧鼻孔為人底手段更不與他如之若何教他自悟去本分宗師為人有時籠罩不教伊出頭有時放令死郎當地却須有出身處大小大巖頭雪峯倒被箇喫飯禪和勘破只如巖頭道黃巢過後還收得劍麼諸人且道這裏合下得什麼語免得他笑又免得雪峯行棒趕出這裏誵訛若不曾親證親悟縱使口頭快利至究竟透脫生死不得山僧尋常教人覷這機關轉處若擬議則遠之遠矣不見投子問鹽平僧云黃巢過後收得劍麼僧以手指地投子云三十年弄馬騎今日却被驢子撲看這僧也不妨是箇作家也不道收得也不道收不得與西京僧如隔海在真如拈云他古人一箇做頭一箇做尾定也雪竇頌云黃巢過後曾收劍孟八郎漢有什麼用處只是錫刀子一口大笑還應作者知一子親得能有機箇不是渠儂爭得自由三十山藤且輕恕同條生同條死朝三千暮八百東家人死西家人助哀却與救得活得便宜是落便宜據欵結案悔不慎當初也有些子黃巢過後曾收劍大笑還應作者知雪竇便頌這僧與巖頭大笑處這箇些子天下人摸索不著且道他笑箇什麼須是作家方知這笑中有權有實有照有用有殺有活三十山藤且輕恕頌這僧後到雪峯面前這僧依舊莽鹵峯便據令而行打三十棒趕出且道為什麼却如此爾要盡情會這話麼得便宜是落便宜六七舉梁武帝請傅大士講金剛經達磨兄弟來也魚行酒肆即不無衲僧門下即不可這老漢老老大大作這般去就大士便於座上揮案一下便下座直得火星迸散似則似是則未是不煩打葛藤武帝愕然兩回三度被人瞞也教他摸索不著志公問陛下還會麼黨理不黨情盵膊不向外也好與三十棒帝云不會可惜許志公云大士講經竟也須逐出國始得當時和志公一時與趕出國始是作家兩箇漢同坑無異土梁高祖武帝蕭氏諱衍字叔達立功業以至受齊禪即位後別注五經講議奉黃老甚篤而性至孝一日思得出世之法以報劬勞於是捨道事佛乃受菩薩戒於婁約法師處披佛袈裟自講放光般若經以報父母時志公大士以顯異惑衆繫於獄中志公乃分身遊化城邑帝一日知之感悟極推重之志公數行遮護隱顯逮不可測時婺州有大士者居雲黃山手栽二樹謂之雙林自稱當來善慧大士一日修書命弟子上表聞於帝時朝廷以其無君臣之禮不受傅大士將入金陵城中賣魚時武帝或請志公講金剛經志公曰貧道不能講市中有傅大士者能講此經帝下詔召之入禁中傅大士既至於講座上揮案一下便下座當時便與推轉免見一場狼籍却被志公云陛下還會麼帝云不會志公云大士講經竟也是一人作頭一人作尾志公恁麼道還夢見傅大士麼一等是弄精魂這箇就中奇特雖是死蛇解弄也活既是講經為甚却不大分為二一如尋常座主道金剛之體堅固物物不能壞利用故能摧萬物如此講説方喚作講經雖然如是諸人殊不知傅大士只拈向上關捩子略露鋒鋩教人知落處直截與爾壁立萬仞恰好被志公不識好惡却云大士講經竟正是好心不得好報如美酒一盞却被志公以水攙過如一釜羹被志公將一顆鼠糞污了且道既不是講經畢竟喚作什麼頌云不向雙林寄此身只為他把不住囊裏豈可藏錐却於梁土惹埃塵若不入草爭見端的不風流處也風流當時不得志公老作賊不須本有牽伴底癩兒也是栖栖去國人正好一狀領過便打不向雙林寄此身却於梁土惹埃塵傅大士與沒板齒老漢一般相逢達磨初到金陵見武帝帝問如何是聖諦第一義磨云廓然無聖帝云對朕者誰磨云不識帝不契遂渡江至魏武帝舉問志公公云陛下還識此人否帝云不識志公云此是觀音大士傳佛心印帝悔遂遣使去取志公云莫道陛下發使去取合國人去他亦不回所以雪竇道當時不得志公老也是栖栖去國人當時若不是志公為傅大士出氣也須是趕出國去志公既饒舌武帝却被他熱瞞一上雪竇大意道不須他來梁士講經揮案所以道何不向雙林寄此身喫粥喫飯隨分過時却來梁士恁麼指注揮案一下便下座便是他惹埃塵處既是要殊勝則目視雲霄上不見有佛下不見有衆生若論出世邊事不免灰頭土面將無作有將有作無將是作非將麁作細魚行酒肆橫拈倒用教一切人明此箇事若不恁麼放行直到彌勒下生也無一箇半箇傅大士既是拖泥帶水賴是有知音若不得志公老幾乎趕出國了且道即今在什麼處垂示云掀天關翻地軸擒虎兕辨龍蛇須是箇活鱍鱍漢始得句句相投機機相應且從上來什麼人合恁麼請舉看六八舉仰山問三聖汝名什麼名實相奪勾賊破家聖云惠寂坐斷舌頭攙旗奪鼓仰山云惠寂是我各自守封疆聖云我名惠然閙市裏奪去彼此却守本分仰山呵呵大笑可謂是箇時節錦上鋪花天下人不知落處何故土廣人稀相逢者少一似巖頭笑又非巖頭笑一等是笑為什麼却作兩段具眼者始定當看三聖是臨濟下尊宿少具出群作略有大機有大用在衆中昂昂藏藏名聞諸方後辭臨濟遍遊淮海到處叢林皆以高賓待之自向北至南方先造雪峯便問透網金鱗未審以何為食峯云待汝出網來即向汝道聖云一千五百人善知識話頭也不識峯云老僧住持事繁峯往寺莊路逢獼猴乃云這獼猴各各佩一面古鏡聖云歷劫無名何以彰為古鏡峯云瑕生也聖云一千五百人善知識話頭也不識峯云罪過老僧住持事繁後至仰山山極愛其俊利待之於明窗下一日有官人來參仰山山問官居何位云推官山竪起拂子云還推得這箇麼官人無語衆人下語俱不契仰山意時三聖病在延壽堂仰山令侍者持此語問之聖云和尚有事也再令侍者問未審有什麼事聖云再犯不容仰山深肯之百丈當時以禪板蒲團付黃檗拄杖拂子付溈山溈山後付仰山仰山既大肯三聖聖一日辭去仰山以拄杖拂子付三聖聖云某甲已有師仰山詰其由乃臨濟的子也只如仰山問三聖汝名什麼他不可不知其名何故更恁麼問所以作家要驗人得知子細只似等間問云汝名什麼更道無計較何故三聖不云惠然却道惠寂看他具眼漢自然不同三聖恁麼又不是顛一向攙旗奪鼓意在仰山語外此語不墮常情難為摸索這般漢手段却活得人所以道他參活句不參死句若順常情則歇人不得看他古人念道如此用盡精神始能大悟既悟了用時還同未悟時人相似隨分一言半句不得落常情三聖知他仰山落處便向他道我名惠寂仰山要收三聖三聖倒收仰山仰山只得就身打劫道惠寂是我是放行處三聖云我名惠然亦是放行所以雪竇後面頌云雙收雙放若為宗只一句內一時頌了仰山呵呵大笑也有權有實也有照有用為他八面玲瓏所以用處得大自在這箇笑與巖頭笑不同巖頭笑有毒藥這箇笑千古萬古清風凜凜地雪竇頌云雙收雙放若為宗知他有幾人八面玲瓏將謂真箇有恁麼事騎虎由來要絶功若不是頂門上有眼肘臂下有符爭得到這裏騎則不妨只恐爾下不得不是恁麼人爭明恁麼事笑罷不知何處去盡四百軍州覓恁麼人也難得言猶在耳千古萬古有清風只應千古動悲風如今在什麼處咄既是大笑為什麼却動悲風大地黑漫漫雙收雙放若為宗放行互為賓主仰山云汝名什麼聖云我名惠寂是雙放仰山云惠寂是我聖云我名惠然是雙收其實是互換之機收則大家收放則大家放雪竇一時頌盡了也他意道若不放收若不互換爾是爾我是我都來只四箇字因甚却於裏頭出沒卷舒古人道爾若立我便坐爾若坐我便立若也同坐同立二俱瞎漢此是雙收雙放可以為宗要騎虎由來要絶功有如此之高風最上之機要要騎便騎要下便下據虎頭亦得收虎尾亦得三聖仰山二俱有此之風笑罷不知何處去且道他笑箇什麼直得清風凜凜為什麼末後却道只應千古動悲風也是死而不弔一時與爾注解了也爭奈天下人啖啄不入不知落處縱是山僧也不知落處諸人還知麼垂示云無啖啄處祖師心印狀似鐵牛之機透荊棘林衲僧家如紅爐上一點雪平地上七穿八穴則且止不落寅緣又作麼生試舉看六九舉南泉歸宗麻谷同去禮拜忠國師至中路三人同行必有我師有什麼奇特也要辨端的南泉於地上畫一圓相云道得即去無風起浪也要人知擲却陸沈船若不驗過爭辨端的歸宗於圓相中坐一人打鑼同道方知麻谷便作女人拜一人打鼓三箇也得泉云恁麼則不去也半路抽身是好人好一場曲調作家作家歸宗云是什麼心行賴得識破當時好與一掌孟八郎漢當時馬祖盛化於江西石頭道行於湖湘忠國師道化於長安他親見六祖來是時南方擎頭帶角者無有不欲升其堂入其室若不爾為人所恥這老漢三箇欲去禮拜忠國師至中路做這一場敗缺南泉云恁麼則不去也既是一一道得為什麼却道不去且道古人意作麼生當時待他道恁麼則不去也劈耳便掌看他作什麼伎倆萬古振綱宗只是這些子機要所以慈明道要牽只在索頭邊撥著點著便轉如水上捺葫蘆子相似人多喚作不相肯語殊不知此事到極則處須離泥離水拔楔抽釘爾若作心行會則沒交涉古人轉變得好到這裏不得不恁麼須是有殺有活看他一人去圓相中坐一人作女人拜也甚好南泉云恁麼則不去也歸宗云是什麼心行孟八郎漢又恁麼去也他恁麼道大意要驗南泉南泉尋常道喚作如如早是變了也南泉歸宗麻谷却是一家裏人一擒一縱一殺一活不妨奇特雪竇頌云由基箭射猿當頭一路誰敢向前觸處得妙未發先中繞樹何太直若不承當爭敢恁麼東西南北一家風已周遮多時也千箇與萬箇如麻似粟野狐精一隊爭奈得南泉何是誰曾中的一箇半箇更洛一箇一箇也用不得相呼相喚歸去來一隊弄泥團漢不如歸去好却較些子曹溪路上休登陟大勞生想料不是曹溪門下客低低處平之有餘高高處觀之不足復云曹溪路坦平為什麼休登陟不唯南泉半路抽身雪竇亦乃半路抽身好事不如無雪竇也患這般病痛由基箭射猿繞樹何太直由基乃是楚時人姓養名叔字由基時楚莊王出獵見一白猿使人射之其猿捉箭而戲敕群臣射之莫有中者王遂問群臣群臣奏曰由基者善射遂令射之由基方彎弓猿乃抱樹悲號至箭發時猿繞樹避之其箭亦繞樹中殺此乃神箭也雪竇何故却言太直若是太直則不中既是繞樹何故却云太直雪竇借其意不妨用得好此事出春秋有者道繞樹是圓相若真箇如此蓋不識語之宗旨不知太直處三箇老漢殊途而同歸一揆一齊太直若是識得他去處七縱八橫不離方寸百川異流同歸大海所以南泉道恁麼則不去也若是衲僧正眼覷著只是弄精魂若喚作弄精魂却不是弄精魂五祖先師道他三人是慧炬三昧莊嚴王三昧雖然如此作女人拜他終不作女人拜會雖畫圓相他終不作圓相會既不恁麼會又作麼生會雪竇道千箇與萬箇是誰曾中的能有幾箇百發百中相呼相喚歸去來頌南泉道恁麼則不去也南泉從此不去故云曹溪路上休登陟滅却荊棘林雪竇把不定復云曹溪路坦平為什麼休登陟曹溪路絶塵絶迹露裸裸赤灑灑平坦坦翛然地為什麼却休登陟各自看腳下垂示云快人一言快馬一鞭萬年一念一念萬年要知直截未舉已前且道未舉已前作麼生摸索請舉看七舉溈山五峯雲巖同侍立百丈阿呵呵終始誵訛君向西秦我之東魯百丈問溈山併却咽喉唇吻作麼生道一將難求溈山云却請和尚道借路經過丈云我不辭向汝道恐已後喪我兒孫不免老婆心切面皮厚三寸和泥合水就身打劫溈山五峯雲巖同侍立百丈百丈問溈山併却咽喉唇吻作麼生道山云却請和尚道丈云我不辭向汝道恐已後喪我兒孫百丈雖然如此鍋子已被別人奪去了也丈復問五峯峯云和尚也須併却丈云無人處斫額望汝又問雲巖巖云和尚有也未丈云喪我兒孫三人各是一家古人道平地上死人無數過得荊棘林者是好手所以宗師家以荊棘林驗人何故若於常情句下驗人不得衲僧家須是句裏呈機言中辨的若是擔板漢多向句中死却便道併却咽喉唇吻更無下口處若是變通底人有逆水之波只向問頭上有一條路不傷鋒犯手溈山云却請和尚道且道他意作麼生向箇裏如擊石火似閃電光相似拶他問處便答自有出身之路不費纖毫氣力所以道他參活句不參死句百丈却不采他只云不辭向汝道恐已後喪我兒孫大凡宗師為人抽釘拔楔若是如今人便道此答不肯他不領話殊不知箇裏一路生機處壁立千仞賓主互換活鱍鱍地雪竇愛他此語風措宛轉自在又能把定封疆所以頌云却請和尚道函蓋乾坤已是傷鋒犯手虎頭生角出荒草可殺驚群不妨奇特十洲春盡花凋殘觸處清涼讚歎也不及珊瑚樹林日杲杲千重百匝爭奈百草頭上尋他不得答處蓋天蓋地此三人答處各各不同也有壁立千仞也有照用同時也有自救不了却請和尚道雪竇便向此一句中呈機了也更就中輕輕拶令人易見云虎頭生角出荒草溈山答處一似猛虎頭上安角有什麼近傍處不見僧問羅山同生不同死時如何山云如牛無角僧云同生亦同死時如何山云如虎戴角雪竇只一句頌了也他有轉變餘才更云十洲春盡花凋殘海上有三山十洲以百年為一春雪竇語帶風措宛轉盤礴春盡之際百千萬株花一時凋殘獨有珊瑚樹林不解凋落與大陽相奪其光交映正當恁麼時不妨奇特雪竇用此明他却請和尚道十洲皆海外諸國之所附一祖洲出反魂香二瀛洲生芝草玉石泉如酒味三玄洲出仙藥服之長生四長洲出木瓜玉英五炎洲出火浣布六元洲出靈泉如蜜七生洲有山川無寒暑八鳳麟洲人取鳳喙麟角煎續弦膠九聚窟洲出獅子銅頭鐵額之獸十檀洲一作流洲出琨吾石作劍切玉如泥珊瑚外國雜傳云大秦西南漲海中可七八百里到珊瑚洲洲底盤石珊瑚生其石上人以鐵網取之又十洲記云珊瑚生南海底如樹高三二尺有枝無皮似玉而紅潤感月而生凡枝頭皆有月暈此一則與八卷首公案同看
