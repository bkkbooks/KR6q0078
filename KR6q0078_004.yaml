body:
  text: 垂示云動則影現覺則氷生其或不動不覺不免入野狐窟裏透得徹信得及無絲毫障翳如龍得水似虎靠山放行也瓦礫生光把定也真金失色古人公案未免周遮且道評論什麼邊事試舉看三一舉麻谷持錫到章敬繞禪床三匝振錫一下卓然而立曹溪樣子一模脫出直得驚天動地敬云是是泥裏洗土塊賺殺一船人是什麼語話繫驢橛子雪竇著語云錯放過則不可猶較一著在麻谷又到南泉繞禪床三匝振錫一下卓然而立依前泥裏洗土塊再運前來蝦跳不出斗泉云不是不是何不承當殺人不眨眼是什麼語話雪竇著語云錯放過不可麻谷當時云章敬道是和尚為什麼道不是主人公在什麼處這漢元來取人舌頭漏逗了也泉云章敬即是是汝不是也好殺人須見血為人須為徹瞞却多少人來此是風力所轉終成敗壞果然被他籠罩爭奈自己何古人行腳遍歷叢林直以此事為念要辨他曲録木床上老和尚具眼不具眼古人一言相契即住一言不契即去看他麻谷到章敬繞禪床三匝振錫一下卓然而立章敬云是是殺人刀活人劍須是本分作家雪竇云錯落在兩邊爾若去兩邊會不見雪竇意他卓然而立且道為什麼事雪竇為什麼却道錯什麼處是他錯處章敬道是什麼處是是處雪竇如坐讀判語麻谷檐箇是字便去見南泉依然繞禪床三匝振錫一下卓然而立泉云不是不是殺人刀活人劍須是本分宗師雪竇云錯章敬道是是南泉云不是不是為復是同是別前頭道是為什麼也錯後頭道不是為什麼也錯若向章敬句下薦得自救也不了若向南泉句下薦得可與祖佛為師雖然恁麼衲僧家須是自肯始得莫一向取人口辨他問既一般為什麼一箇道是一箇道不是若是通方作者得大解脫底人必須別有生涯若是機境不忘底決定滯在這兩頭若要明辨古今坐斷天下人舌頭須是明取這兩錯始得及至後頭雪竇頌也只頌這兩錯雪竇要提活鱍鱍處所以如此若是皮下有血底漢自然不向言句中作解會不向繫驢橛上作道理有者道雪竇代麻谷下這兩錯有什麼交涉殊不知古人著語鎖斷要關這邊也是那邊也是畢竟不在這兩頭慶藏主道持錫繞禪床是與不是俱錯其實亦不在此爾不見永嘉到曹溪見六祖繞禪床三匝振錫一下卓然而立祖云夫沙門者具三千威儀八萬細行大德從何方而來生大我慢為什麼六祖却道他生大我慢此箇也不說是也不說不是是與不是都是繫驢橛唯有雪竇下兩錯猶較些子麻谷云章敬道是和尚為什麼道不是這老漢不惜眉毛漏逗不少南泉道章敬則是是汝不是南泉可謂見兔放鷹慶藏主云南泉忒殺郎當不是便休更與他出過道此是風力所轉終成敗壞圓覺經云我今此身四大和合所謂髮毛爪齒皮肉筋骨髓腦垢色皆歸於地唾涕膿血皆歸於水暖氣歸火動轉歸風四大各離今者妄身當在何處他麻谷持錫繞禪床既是風力所轉終成敗壞且道畢竟發明心宗底事在什麼處到這裏也須是生鐵鑄就底箇漢始得豈不見張拙秀才參西堂藏禪師問云山河大地是有是無三世諸佛是有是無藏云有張拙秀才云錯藏云先輩曾參見什麼人來拙云參見徑山和尚來某甲凡有所問話徑山皆言無藏云先輩有什麼眷屬拙云有一山妻兩箇癡頑又却問徑山有甚眷屬拙云徑山古佛和尚莫謗渠好藏云待先輩得似徑山時一切言無張拙俯首而已大凡作家宗師要與人解粘去縛抽釘拔楔不可只守一邊左撥右轉右撥左轉但看仰山到中邑處謝戒邑見來於禪床上拍手云和尚仰山即東邊立又西邊立又於中心立然後謝戒了却退後立邑云什麼處得此三昧來仰山云於曹溪印子上脫將來邑云汝道曹溪用此三昧接什麼人仰云接一宿覺仰山又復問中邑云和尚什麼處得此三昧來邑云我於馬祖處得此三昧來似恁麼說話豈不是舉一明三見本逐末底漢龍牙示衆道夫參學人須透過祖佛始得新豐和尚道見祖佛言教如生冤家始有參學分若透不得即被祖佛瞞去時有僧問祖佛還有瞞人之心也無牙云汝道江湖還有礙人之心也無又云江湖雖無礙人之心自是時人過不得所以江湖却成礙人去不得道江湖不礙人祖佛雖無瞞人之心自是時人透不得祖佛却成瞞人去也不得道祖佛不瞞人若透得祖佛過此人即過却祖佛也須是體得祖佛意方與向上古人同如未透得儻學佛學祖則萬劫無有得期又問如何得不被祖佛瞞去牙云直須自悟去到這裏須是如此始得何故為人須為徹殺人須見血南泉雪竇是這般人方敢拈弄頌云此錯彼錯惜取眉毛據令而行天上天下唯我獨尊切忌拈却兩箇無孔鐵鎚直饒千手大悲也提不起或若拈去闍黎喫三十棒四海浪平天下人不敢動著東西南北一等家風近日多雨水百川潮落淨裸裸赤灑灑且得自家安穩直得海晏河清古策風高十二門何似這箇杖頭無眼切忌向拄杖頭上作活計門門有路空蕭索一物也無賺爾平生覷著即瞎非蕭索果然賴有轉身處已瞎了也便打作者好求無病藥一死更不再活十二時中為什麼瞌睡撈天摸地作什麼這一箇頌似德山見溈山公案相似先將公案著兩轉語穿作一串然後頌出此錯彼錯切忌拈却雪竇意云此處一錯彼處一錯切忌拈却拈却即乖須是如此著這兩錯直得四海浪平百川潮落可殺清風明月爾若向這兩錯下會得更沒一星事山是山水是水長者自長短者自短五日一風十日一雨所以道四海浪平百川潮落後面頌麻谷持錫云古策風高十二門古人以鞭為策衲僧家以拄杖為策祖庭事苑中古策舉錫杖經西王母瑤池上有十二朱門古策即是拄杖頭上清風高於十二朱門天子及帝釋所居之處亦各有十二朱門若是會得這兩錯拄杖頭上生光古策也用不著古人道識得拄杖子一生參學事畢又道不是標形虛事褫如來寶杖親蹤跡此之類也到這裏七顛八倒於一切時中得大自在門門有路空蕭索雖有路只是空蕭索雪竇到此自覺漏逗更與爾打破然雖如是也有非蕭索處任是作者無病時也須是先討些藥喫始得垂示云十方坐斷千眼頓開一句截流萬機寢削還有同死同生底麼見成公案打疊不下古人葛藤試請舉看三二舉定上座問臨濟如何是佛法大意多少人到此茫然猶有這箇在訝郎當作什麼濟下禪床擒住與一掌便托開今日捉敗老婆心切天下衲僧跳不出定佇立已落鬼窟裏蹉過了也未免失却鼻孔傍僧云定上座何不禮拜冷地裏有人覷破全得他力東家人死西家人助哀定方禮拜將勤補拙忽然大悟如暗得燈如貧得寶將錯就錯且道定上座見箇什麼便禮拜看他恁麼直出直入直往直來乃是臨濟正宗有恁麼作用若透得去便可翻天作地自得受用定上座是這般漢被臨濟一掌禮拜起來便知落處他是向北人最朴直既得之後更不出世後來全用臨濟機也不妨頴脫一日路逢巖頭雪峯欽山三人巖頭乃問甚處來定云臨濟頭云和尚萬福定云已順世了也頭云某等三人特去禮拜福緣淺薄又值歸寂未審和尚在日有何言句請上座舉一兩則看定遂舉臨濟一日示衆云赤肉團上有一無位真人常從汝諸人面門出入未證據者看看時有僧出問如何是無位真人濟便擒住云道道僧擬議濟便托開云無位真人是什麼乾屎橛便歸方丈巖頭不覺吐舌欽山云何不道非無位真人被定擒住云無位真人與非無位真人相去多少速道速道山無語直得面黃面青巖頭雪峯近前禮拜云這新戒不識好惡觸忤上座望慈悲且放過定云若不是這兩箇老漢𡎺殺這尿床鬼子又在鎮州齊回到橋上歇逢三人座主一人問如何是禪河深處須窮底定擒住擬拋向橋下時二座主連忙救云休休是伊觸忤上座且望慈悲定云若不是二座主從他窮到底去看他恁麼手段全是臨濟作用更看雪竇頌出云斷際全機繼後蹤黃河從源頭濁了也子承父業持來何必在從容在什麼處爭奈有如此人無腳手人還得他也無巨靈擡手無多子嚇殺人少賣弄打一拂子更不再勘分破華山千萬重乾坤大地一時露出墮也雪竇頌斷際全機繼後蹤持來何必在從容黃檗大機大用唯臨濟獨繼其蹤拈得將來不容擬議或若躊躇便落陰界楞嚴經云如我按指海印發光汝暫舉心塵勞先起巨靈擡手無多子分破華山千萬重巨靈神有大神力以手擘開太華放水流入黃河定上座疑情如山堆嶽積被臨濟一掌直得瓦解氷消垂示云東西不辨南北不分從朝至暮從暮至朝還道伊瞌睡麼有時眼似流星還道伊惺惺麼有時呼南作北且道是有心是無心是道人是常人若向箇裏透得始知落處方知古人恁麼不恁麼且道是什麼時節試舉看三三舉陳操尚書看資福福見來便畫一圓相是精識精是賊識賊若不蘊藉爭識這漢還見金剛圈麼操云弟子恁麼來早是不著便何況更畫一圓相今日撞著箇瞌睡漢這老賊福便掩却方丈門賊不打貧兒家已入他圈繢了也雪竇云陳操只具一隻眼雪竇頂門具眼且道他意在什麼處也好與一圓相灼然龍頭蛇尾當時好與一拶教伊進亦無門退亦無路且道更與他什麼一拶陳操尚書與裴休李翱同時凡見一僧來先請齊襯錢三百須是勘辨一日雲門到相看便問儒書中即不問三乘十二分教自有座主作麼生是衲僧家行腳事雲門云尚書曾問幾人來操云即今問上座門云即今且置作麼生是教意操云黃卷赤軸門云這箇是文字語言作麼生是教意操云口欲談而辭喪心欲緣而慮亡門云口欲談而辭喪為對有言心欲緣而慮亡為對妄想作麼生是教意操無語門云見說尚書看法華經是否操云是門云經中道一切治生産業皆與實相不相違背且道非非想天即今有幾人退位操又無語門云尚書且莫草草師僧家拋却三經五論來入叢林十年二十年尚自不奈何尚書又爭得會操禮拜云某甲罪過又一日與衆官登樓次望見數僧來一官人云來者總是禪僧操云不是官云焉知不是操云待近來與爾勘過僧至樓前操驀召云上座僧舉頭書謂衆官云不信道唯有雲門一人他勘不得他參見睦州來一日去參資福福見來便畫一圓相資福乃溈山仰山下尊宿尋常愛以境致接人見陳操尚書便畫一圓相爭奈操却是作家不受人瞞解自點檢云弟子恁麼來早是不著便那堪更畫一圓相福掩却門這般公案謂之言中辨的句裏藏機雪竇道陳操只具一隻眼雪竇可謂頂門具眼且道意在什麼處也好與一圓相若總恁麼地衲僧家如何為人我且問爾當時若是諸人作陳操時堪下得箇什麼語免得雪竇道他只具一隻眼所以雪竇踏翻頌云團團珠繞玉珊珊三尺杖子攪黃河須是碧眼胡僧始得生鐵鑄就馬載驢駝上鐵船用許多作什麼有什麼限且與闍𥠖看分付海山無事客有人不要若是無事客也不消得須是無事始得釣鼇時下一圈攣恁麼來恁麼去一時出不得若是蝦䗫堪作什麼蝦蜆螺蚌怎生奈何須是釣鼇始得雪竇復云天下衲僧跳不出兼身在內一坑埋却闍𥠖還跳得出麼團團珠繞玉珊珊馬載驢駝上鐵船雪竇當頭頌出只頌箇圓相若會得去如虎戴角相似這箇些子須是桶底脫機關盡得失是非一時放却更不要作道理會也不得作玄妙會畢竟作麼生會這箇須是馬載驢駝上鐵船這裏看始得別處則不可分付須是將去分付海山無事底客爾若肚裏有些子事即承當不得這裏須是有事無事違情順境若佛若祖奈何他不得底人方可承當若有禪可參有凡聖情量決定承當他底不得承當得了作麼生會他道釣鼇時下一圈攣釣鼇須是圈攣始得所以風穴云慣釣鯨鯢澄巨浸却嗟蛙步碾泥沙又云巨鼇莫戴三山去吾欲逢萊頂上行雪竇復云天下衲僧跳不出若是巨鼇終不作衲僧見解若是衲僧終不作巨鼇見解三四舉仰山問僧近離甚處天下人一般也要問過因風吹火不可不作常程僧云廬山實頭人難得山云曾遊五老峯麼因行不妨掉臂何曾蹉過僧云不曾到移一步面赤不如語直也似忘前失後山云闍黎不曾遊山太多事生惜取眉毛好這老漢著甚死急雲門云此語皆為慈悲之故有落草之談殺人刀活人劒兩箇三箇要知山上路須是去來人驗人端的處下口便知音古人道沒量大人向語脈裏轉却若是頂門具眼舉著便知落處看他一問一答歷歷分明雲門為什麼却道此語皆為慈悲之故有落草之談古人到這裏如明鏡當臺明珠在掌胡來胡現漢來漢現一箇蠅子也過他鑑不得且道作麼生是慈悲之故有落草之談也不妨險峻到這田地也須是箇漢始可提掇雲門拈云這僧親從廬山來因什麼却道闍黎不曾遊山溈山一日問抑山云諸方若有僧來汝將什麼驗他仰山云某甲有驗處溈山云子試舉看仰云某甲尋常見僧來只舉拂子向伊道諸方還有這箇麼待伊有語只向伊道這箇即且置那箇如何溈山云此是向上人牙爪豈不見馬祖問百丈什麼處來丈云山下來祖云路上還逢著一人麼丈云不曾祖云為什麼不曾逢著丈云若逢著即舉似和尚祖云那裏得這消息來丈云某甲罪過祖云却是老僧罪過仰山問僧正相類此當時待他道曾到五老峯麼這僧若是箇漢但云禍事却道不曾到這僧既不作家仰山何不據令而行免見後面許多葛藤却云闍黎不曾遊山所以雲門道此語皆為慈悲之故有落草之談若是出草之談則不恁麼出草入草頭上漫漫腳下漫漫半開半合他也恁麼我也恁麼誰解尋討頂門具一隻眼闍𥠖不解尋討白雲重重千重百匝頭上安頭紅日杲杲破也瞎舉眼即錯左顧無瑕瞎漢依前無事爾作許多伎倆作什麼右盻已老一念萬年過君不見寒山子癩兒牽伴行太早也不早十年歸不得即今在什麼處灼然忘却來時道渠儂得自由放過一著便打莫做這忘前失後好出草入草誰解尋討雪竇却知他落處到這裏一手擡一手搦白雲重重紅日杲杲大似草茸茸煙羃羃到這裏無一絲毫屬凡無一絲毫屬聖遍界不曾藏一一蓋覆不得所謂無心境界寒不聞寒熱不聞熱都盧是箇大解脫門左顧無瑕右盻已老懶瓚和尚隱居衡山石室中唐德宗聞其名遣使召之使者至其室宣言天子有詔尊者當起謝恩瓚方撥牛糞火尋煨芋而食寒涕垂頤未嘗答使者笑曰且勸尊者拭涕瓚曰我豈有工夫為俗人拭涕耶竟不起使回奏德宗甚欽嘆之似這般清寥寥白的的不受人處分直是把得定如生鐵鑄就相似只如善道和尚遭沙汰後更不復作僧人呼為石室行者每踏碓忘移步僧問臨濟石室行者忘移步意旨如何濟云沒溺深坑法眼圓成實性頌云理極忘情謂如何有喻齊到頭霜夜月任運落前溪果熟兼猿重山長似路迷舉頭殘照在元是住居西雪竇道君不見寒山子行太早十年歸不得忘却來時道寒山子詩云欲得安身處寒山可長保微風吹幽松近聽聲愈好下有班白人嘮嘮讀黃老十年歸不得忘却來時道永嘉又道心是根法是塵兩種猶如鏡上痕痕垢盡時光始現心法雙忘性即真到這裏如癡似兀方見此公案若不到這田地只在語言中走有甚了曰垂示云定龍蛇分玉石別緇素決猶豫若不是頂門上有眼肘臂下有符往往當頭蹉過只如今見聞不昧聲色純真且道是皂是白是曲是直到這裏作麼生辨三五舉文殊問無著近離什麼處不可不借問也有這箇消息無著云南方草窠裏出頭何必擔向眉毛上大方無外為什麼却有南方殊云南方佛法如何住持若問別人則禍生猶掛唇齒在著云末法比丘少奉戒律實頭人難得殊云多少衆當時便與一喝一拶拶倒了也著云或三百或五百盡是野狐精果然漏逗無著問文殊此間如何住持拶著便回轉鎗頭來也殊云凡聖同居龍蛇混雜敗缺不少直得腳忙手亂著云多少衆還我話頭來也不得放過殊云前三三後三三顛言倒語且道是多少千手大悲數不足無著遊五臺至中路荒僻處文殊化一寺接他宿遂問近離甚處著云南方殊云南方佛法如何住持著云末法比丘少奉戒律殊云多少衆著云或三百或五百無著却問文殊此間如何住持殊云凡聖同居龍蛇混雜著云多少衆殊云前三三後三三却喫茶文殊舉起玻璃盞子云南方還有這箇麼著云無殊云尋常將什麼喫茶著無語遂辭去文殊令均提童子送出門首無著問童子云適來道前三三後三三是多少童子云大德著應喏童子云是多少又問此是何寺童子指金剛後面著回首化寺童子悉隱不見只是空谷彼處後來謂之金剛窟後有僧問風穴如何是清涼山中主穴云一句不遑無著問迄今猶作野盤僧若要參透平平實實腳踏實地向無著言下薦得自然居鑊湯爐炭中亦不聞熱居寒氷上亦不聞冷若要參透使孤危峭峻如金剛王寶劍向文殊言下薦取自然水灑不著風吹不入不見漳州地藏問僧近離甚處僧云南方藏云彼中佛法如何僧云商量浩浩地藏云爭似我這裏種田博飯喫且道與文殊答處是同是別有底道無著答處不是文殊答處也有龍有蛇有凡有聖有什麼交涉還辨明得前三三後三三麼前箭猶輕後箭深且道是多少若向這裏透得千句萬句只是一句若向此一句下截得斷把得住相次間到這境界千峯盤屈色如藍還見文殊麼誰謂文殊是對談設使普賢也不顧蹉過了也堪笑清涼多少衆且道笑什麼已在言前前三三與後三三試請腳下辨看爛泥裏有刺碗子落地楪子成七片千峯盤屈色如藍誰謂文殊是對談有者道雪竇只是重拈一遍不曾頌著只如僧問法眼如何是曹源一滴水眼云是曹源一滴水又僧問琅瑘覺和尚清淨本然云何忽生山河大地覺云清淨本然云何忽生山河大地不可也喚作重拈一遍明招獨眼龍亦頌其意有蓋天蓋地之機道廓周沙界勝伽藍滿目文殊是對談言下不知開佛眼回頭只見翠山巖廓周沙界勝伽藍此指草窟化寺所謂有權實雙行之機滿目文殊是對談言下不知開佛眼回頭只見翠山巖正當恁麼時喚作文殊普賢觀音境界得麼要且不是這箇道理雪竇只改明招底用却有針線千峯盤屈色如藍更不傷鋒犯手句中有權有實有理有事誰謂文殊是對談一夜對談不知是文殊後來無著在五臺山作典座文殊每於粥鍋上現被無著拈攪粥篦便打雖然如是也是賊過後張弓當時等他道南方佛法如何住持劈脊便棒猶較些子堪笑清涼多少衆雪竇笑中有刀若會得這笑處便見他道前三三與後三三三六舉長沙一日遊山歸至門首今日一日只管落草前頭也是落草後頭也是落草首座問和尚什麼處去來也要勘過這老漢頭過新羅沙云遊山來不可落草敗缺不少草裏漢首座云到什麼處來拶若有所至未免落草相牽入火坑沙云始隨芳草去又逐落花回漏逗不少元來只在荊棘林裏坐座云大似春意相隨來也將錯就錯一手擡一手搦沙云也勝秋露滴芙蕖土上加泥前箭猶輕後箭深有什麼了期雪竇著語云謝答話一火弄泥團漢三箇一狀領過長沙鹿苑招賢大師法嗣南泉與趙州紫胡輩同時機鋒敏捷有人問教便與說教要頌便與頌爾若要作家相見便與爾作家相見仰山尋常機鋒最為第一一日同長沙玩月次仰山指月云人人盡有這箇只是用不得沙云恰是便倩爾用那仰山云爾試用看沙一踏踏倒仰山起云師叔一似箇大蟲後來人號為岑大蟲因一日遊山歸首座亦是他會下人便問和尚什麼處去來沙云遊山來座云到什麼處去來沙云始隨芳草去又逐落花回須是坐斷十方底人始得古人出入未嘗不以此事為念看他賓主互換當機直截各不相饒既是遊山為什麼却問道到什麼處去來若是如今禪和子便道到夾山亭來看他古人無絲毫道理計較亦無住著處所以道始隨芳草去又逐落花回首座便隨他意向他道大似春意沙云也勝秋露滴芙蕖雪竇云謝答語代末後語也也落兩邊畢竟不在這兩邊昔有張拙秀才看千佛名經乃問百千諸佛但聞其名未審居何國土還化物也無沙云黃鶴樓崔皓題詩後秀才曾題也未拙云未曾題沙云得間題取一篇也好岑大蟲平生為人直得珠回玉轉要人當面便會頌云大地絶纖埃豁開戶牖當軒者誰盡少這箇不得天下太平何人眼不開頂門上放大光明始得撒土撒沙作什麼始隨芳草去漏逗不少不是一回落草賴值前頭已道了又逐落花回處處全真且喜歸來腳下泥深三尺羸鶴翹寒木左之右之添一句更有許多間事在狂猿嘯古臺却因新著力添一句也不得減一句也不得長沙無限意便打末後一句道什麼一坑埋却墮在鬼窟裏咄草裏漢賊過後張弓更不可放過且道這公案與仰山問僧近離甚處僧云廬山仰云曾到五老峯麼僧云不曾到仰云闍黎不曾遊山辨緇素看是同是別到這裏須是機關盡意識忘山河大地草芥人畜無些子滲漏若不如此古人謂之猶在勝妙境界不見雲門道直得山河大地無纖毫過患猶為轉物不見一切色始是半提更須知有全提時節向上一竅始解穩坐若透得依舊山是山水是水各住自位各當本體如大拍盲人相似趙州道雞鳴丑愁見起來還漏逗裙子褊衫箇也無袈裟形相些些有裩無襠袴無口頭上青灰三五斗本為修行利濟人誰知翻成不唧𠺕若得真實到這境界何人眼不開一任七顛八倒一切處都是這境界都是這時節十方無壁落四面亦無門所以道始隨芳草去又逐落花回雪竇不妨巧只去他左邊貼一句右邊貼一句一似一首詩相似羸鶴翹寒木狂猿嘯古臺雪竇引到這裏自覺漏逗驀云長沙無限意咄如作夢却醒相似雪竇雖下一喝未得勦絶若是山僧即不然長沙無限意掘地更深埋垂示云掣電之機徒勞佇思當空霹靂掩耳難諧腦門上播紅旗耳背後輪雙劍若不是眼辨手親爭能搆得有般底低頭佇思意根下卜度殊不知髑髏前見鬼無數且道不落意根不抱得失忽有箇恁麼舉覺作麼生祗對試舉看三七舉盤山垂語云三界無法箭既離弦無返回勢月明照見夜行人中也識法耆懼好和聲便打何處求心莫瞞人好不勞重舉自點檢看便打云是什麼向北幽州盤山寶積和尚乃馬祖下尊宿後出普化一人師臨遷化謂衆云還有人邈得吾真麼衆皆寫真呈師師皆叱之普化出云某甲邈得師云何不呈似老僧普化便打筋斗而出師云這漢向後如風狂接人去在一日示衆云三界無法何處求心四大本空佛依何住璣不動寂止無痕覿面相呈更無餘事雪竇拈兩句來頌直是渾金璞玉不見道瘥病不假驢駝藥山僧為什麼道和聲便打只為他擔枷過狀古人道聞稱聲外句莫向意中求且道他意作麼生直得奔流度刃電轉星飛若擬議尋思千佛出世也摸索他不著若是深入閫奧徹骨徹髓見得透底盤山一場敗缺若承言會宗左轉右轉底盤山只得一橛若是拖泥帶水聲色堆裏轉未夢見盤山在五祖先師道透過那邊方有自由分不見三祖道執之失度必入邪路放之自然體無去住若向這裏道無佛無法又打入鬼窟裏去古人謂之解脫深坑本是善因而招惡果所以道無為無事人猶遭金鎖難也須是窮到底始得若向無言處言得行不得處行得謂之轉身處三界無法何處求心爾若作情解只在他言下死却雪竇見處七穿八穴所以頌出三界無法言猶在耳何處求心不勞重舉自點檢看打云是什麼白雲為蓋頭上安頭千重萬重流泉作琴聞麼相隨來也一聽一堪悲一曲兩曲無人會不落宮商非干角徵借路經過五音六律盡分明自領出去聽則聾雨過夜塘秋水深迅雷不及掩耳直得拖泥帶水在什麼處便打三界無法何處求心雪竇頌得一似華嚴境界有者道雪竇無中唱出若是眼皮綻底終不恁麼會雪竇去他傍邊貼兩句道白雲為蓋流泉作琴蘇內翰見照覺有頌云溪聲便是廣長舌山色豈非清淨身夜來八萬四千偈他日如何舉似人雪竇借流泉作一片長舌頭所以道一曲兩曲無人會不見九峯虔和尚道還識得命麼流泉是命湛寂是身千波競起是文殊家風一亘晴空是普賢境界流泉作琴一曲兩曲無人會這般曲調也須是知音始得若非其人徒勞側耳古人道聾人也唱胡家曲好惡高低總不聞雲門道舉不顧即差互擬思量何劫悟舉是體顧是用未舉已前朕兆未分已前見得坐斷要津若朕兆才分見得便有照用若朕兆分後見得落在意根雪竇忒殺慈悲更向爾道却似雨過夜塘秋水深此一頌曾有人論量美雪竇有翰林之才雨過夜塘秋水深也須是急著眼看更若遲疑即討不見垂示云若論漸也返常合道閙市裏七縱八橫若論頓也不留朕迹千聖亦摸索不著儻或不立頓漸又作麼生快人一言快馬一鞭正恁麼時誰是作者試舉看三八舉風穴在郢州衙內上堂云倚公說禪道什麼祖師心印狀似鐵牛之機千人萬人撼不動誵訛節角在什麼處三要印開不犯鋒鋩去即印住正令當行錯住即印破再犯不容看取令行時拶便打只如不去不住看無頓置處多少誵訛印即是不印即是天下人頭出頭沒有分文彩已彰但請掀倒禪床喝散大衆時有盧陂長老出問某甲有鐵牛之機釣得一箇諳曉得不妨奇特請師不搭印好箇話頭爭奈誵訛穴云慣釣鯨鯢澄巨浸却嗟蛙步輾泥沙似鶻捉鳩寶網漫空神駒千里陂佇思可惜許也有出身處可惜放過穴喝云長老何不進語攙旗奪鼓炒閙來也陂擬議三回死了兩重公案穴打一拂子好打這箇令須是恁麼人行始得穴云還記得話頭麼試舉看何必雪上加霜陂擬開口一死更不再活這漢鈍置殺人遭他毒手穴又打一拂子牧主云佛法與王法一般灼然却被傍人覷破穴云見箇什麼道理也好與一拶却回鎗頭來也牧主云當斷不斷返招其亂似則似是則未是須知傍人有眼東家人死西家人助哀穴便下座將錯就錯見機而變且得參學事畢風穴乃臨濟下尊宿臨濟當初在黃檗會下栽松次檗云深山裏栽許多松作什麼濟云一與山門作境致二與後人作標榜道了便钁地一下檗云雖然如是子已喫二十棒了也濟又打地一下云噓噓檗云吾宗到汝大興於世溈山哲云臨濟恁麼大似平地喫交雖然如是臨危不變始稱真丈夫檗云吾宗到汝大興於世大似憐兒不覺醜後來溈山問仰山黃檗當時只囑付臨濟一人別更有在仰山云有只是年代深遠不欲舉似和尚溈山云雖然如是吾亦要知但舉看仰山云一人指南吳越令行遇大風即止此乃讖風穴也穴初參雪峯五年因請益臨濟入堂兩堂首座齊下一喝僧問臨濟還有賓主也無濟云賓主歷然穴云未審意旨如何峯云吾昔與巖頭欽山去見臨濟在途中聞已遷化若要會他賓主話須是參他宗派下尊宿穴後又見瑞巖常自喚主人公自云喏復云惺惺著他後莫受人瞞却穴云自拈自弄有什麼難後在襄州鹿門與廓侍者過夏廓指他來參南院穴云入門須辨主端的請師分一日遂見南院舉前話云某甲特來親覲南院云雪峯古佛一日見鏡清清問近離甚處穴云自離東來清云還過小江否穴云大舸獨飄空小江無可濟清云鏡水圖山鳥飛不渡子莫盜聽遺言穴云滄溟尚怯蒙輪勢列漢飛帆渡五湖清竪起拂子云爭奈這箇何穴云這箇是什麼清云果然不識穴云出沒卷舒與師同用清云杓卜聽虛聲熟睡饒譫語穴云澤廣藏山理能伏豹清云赦罪放愆速須出去穴云出即失乃便出至法堂上自謂言大丈夫公案未了豈可便休却回再入方丈清坐次便問某適來輒呈騃見冒瀆尊顏伏蒙和尚慈悲未賜罪責清云適來從東來豈不是翠嚴來穴云雪竇親棲寶蓋東清云不逐亡羊狂解息却來這裏念詩篇穴云路逢劍客須呈劍不是詩人莫獻詩清云詩速祕却略借劍峯穴云首甑人携劍去清云不獨觸風化亦自顯顢頇穴云若不觸風化焉明古佛心清云何名古佛心穴又云再許允容師今何有清云東來衲子菽麥不分穴云只聞不以而以何得抑以而以清云巨浪湧千尋澄波不離水穴云一句截流萬機寢削穴便禮拜清以拂子點三點云俊哉且坐喫茶風穴初到南院入門不禮拜院云入門須辨主穴云端的請師分院左手拍膝一下穴便喝院右手拍膝一下穴亦喝院舉左手云這箇即從闍黎又舉右手云這箇又作麼生穴云瞎院遂拈拄杖穴云作什麼某甲奪却拄杖打著和尚莫言不道院便擲下拄杖云今日被這黃面浙子鈍置一上穴云和尚大似持鉢不得詐道不飢院云闍黎莫曾到此間麼穴云是何言歟院云好好借問穴云也不得放過院云且坐喫茶爾看俊流自是機鋒峭峻南院亦未辨得他至次日南院只作平常問云今夏在什麼處穴云鹿門與廓侍者同過夏院云元來親見作家來又云他向爾道什麼穴云始終只教某甲一向作主院便打推出方丈云這般納敗缺底漢有什麼用處穴自此服膺在南院會下作園頭一日院到園裏問云南方一棒作麼生商量穴云作奇特商量穴云和尚此間作麼生商量院拈棒起云棒下無生忍臨機不讓師穴於是豁然大悟是時五代離亂郢州牧主請師度夏是時臨濟一宗大盛他凡是問答垂示不妨語句尖新攢花簇錦字字皆有下落一日牧主請師上堂示衆云祖師心印狀似鐵牛之機去即印住住即印破只如不去不住印即是不印即是何故不似石人木馬之機直下似鐵牛之機無爾撼動處爾才去即印住爾才住即印破教爾百雜碎只如不去不住印即是不印即是看他恁麼垂示可謂鉤頭有餌是時座下有盧陂長老亦是臨濟下尊宿敢出頭來與他對機便轉他話頭致箇問端不妨奇特道某甲有鐵牛之機請師不搭印爭奈風穴是作家便答他道慣釣鯨鯢澄巨浸却嗟蛙步輾泥沙也是言中有響雲門云垂鉤四海只釣獰龍格外玄機為尋知已巨浸乃十二頭水牯牛為鉤餌却只釣得一蛙出來此語且無玄妙亦無道理計較古人道若向事上覻則易若向意根下卜度則沒交涉盧陂佇思見之不取千載難逢可惜許所以道直饒講得千經論一可臨機下口難其實盧陂要討好語對他不欲行令被風穴一向用攙旗奪鼓底機鋒一向逼將去只得沒奈何俗諺云陳敗不禁苕菷掃當初更要討鎗法敵他等爾討得來即頭落地牧主亦久參風穴解道佛法與王法一般穴云爾見箇什麼牧主云當斷不斷返招其亂風穴渾是一團精神如水上葫蘆子相似捺著便轉按著便動解隨機說法若不隨機翻成妄語穴便下座只如臨濟有四賓主話夫參學之人大須子細如賓主相見有語論賓主往來或應物見形全體作用或把機權喜怒或現半身或乘獅子或乘象王如有真正學人便喝先拈出一箇膠盆子善知識不辨是境便上他境上作模作樣便學人又喝前人不肯放下此是膏肓之病不堪醫治喚作賓看主或是善知識不拈出物隨學人問處便奪學人被奪抵死不放此是主看賓或有學人應一箇清淨境出善知識前知識辨得是境把他拋向坑裏學人言大好善知識知識即云咄哉不識好惡學人禮拜此喚作主看主或有學人披枷帶鎖出善知識前知識更與他安一重枷鎖學人歡喜彼此不辨呼為賓看賓大德山僧所舉皆是辨魔揀異知其邪正不見僧問慈明一喝分賓主照用一時行時如何慈明便喝又雲居弘覺禪師示衆云譬如獅子捉象亦全其力捉兔亦全其力時有僧問未審全什麼力雲居云不欺之力看他雪竇頌出堅堯切通作梟斷首倒縣擒得盧陂跨鐵牛千人萬人中也要呈巧藝敗軍之將不再斬三玄戈甲未輕酬當局者迷受災如受福受降如受敵楚王城畔朝宗水說什麼朝宗水浩浩充塞天地任是四海也須倒流喝下曾令却倒流不是這一喝截却爾舌頭咄驚走陝府鐵牛嚇殺嘉州大象雪竇知風穴有這般宗風便頌道擒得盧陂跨鐵牛三玄戈甲未輕酬臨濟下有三玄三要凡一句中須具三玄一玄中須具三要僧問臨濟如何是第一句濟云三要印開朱點窄未容擬議主賓分如何是第二句濟云妙辨豈容無著問漚和不負截流機如何是第三句濟云但看棚頭弄傀儡抽牽全藉裏頭人風穴一句中便具三玄戈甲七事隨身不輕酬他若不如此爭奈盧陂何後面雪竇要出臨濟下機鋒莫道是盧陂假饒楚王城畔洪波浩渺白浪滔天盡去朝宗只消一喝也須教倒流垂示云途中受用底似虎靠山世諦流布底如猿在檻欲知佛性義當觀時節因緣欲煅百鍊精金須是作家爐韛且道大用現前底將什麼試驗三九舉僧問雲門如何是清淨法身𡏖圾堆頭見丈六金身斑斑駁駁是什麼門云花藥欄問處不真答來鹵莽𡎺著磕著曲不藏直僧云便恁麼去時如何渾崙吞箇棗放憨作麼門云金毛獅子也褒也貶兩采一賽將錯就錯是什麼心行諸人還知這僧問處與雲門答處麼若知得兩口同無一舌若不知未免顢頇僧問玄沙如何是清淨法身沙云膿滴滴地具金剛眼試請辨看雲門不同別人有時把定壁立萬仞無爾湊泊處有時與爾開一線道同死同生雲門三寸甚密有者道是信彩答去若恁麼會且道雲門落在什麼處這箇是屋裏事莫向外卜度所以百丈道森羅萬象一切語言皆轉歸自己令轉轆轆地向活潑潑處便道若擬議尋思便落第二句了也永嘉道法身覺了無一物本源自性天真佛雲門驗這僧其僧亦是他屋裏人自是久參知他屋裏事進云便恁麼去時如何門云金毛獅子且道是肯他是不肯他是褒他是貶他巖頭道若論戰也箇箇立在轉處又道他參活句不參死句活句下薦得永劫不忘死句下薦得自救不了又僧問雲門佛法如水中月是否門云清波無透路進云和尚從何而得門云再問復何來僧云正恁麼去時如何門云重疊關山路須知此事不在言句上如擊石火似閃電光構得構不得未免喪身失命雪竇是其中人便當頭頌出花藥欄言猶在耳莫顢頇如麻似粟也有些子自領出去星在稱兮不在盤太葛藤各自向衣單下返觀不免說道理便恁麼渾崙吞箇棗太無端自領出去灼然莫錯怪他雲門好金毛獅子大家看放出一箇半箇也是箇狗子雲門也是普州人送賊雪竇相席打令動絃別曲一句一句判將去此一頌不異拈古之格花藥欄便道莫顢頇人皆道雲門信彩答將去總作情解會他底所以雪竇下本分莫料便道莫顢頇蓋雲門意不在花藥欄處所以雪竇道星在稱兮不在盤這一句忒殺漏逗水中元無月月在青天如星在稱不在於槃且道那箇是稱若辨明得出不辜負雪竇古人到這裏也不妨慈悲分明向爾道不在這裏在那邊去且道那邊是什麼處此頌頭邊一句了後面頌這僧道便恁麼去時如何雪竇道這僧也太無端且道是明頭合暗頭合會來恁麼道不會來恁麼道金毛獅子大家看還見金毛獅子麼瞎垂示云休去歇去鐵樹開花有麼有麼黠兒落節直饒七縱八橫不免穿他鼻孔且道誵訛在什麼處試舉看四舉陸亘大夫與南泉語話次陸云肇法師道天地與我同根萬物與我一體也甚奇怪鬼窟裏作活計畫餅不可充飢也是草裏商量南泉指庭前花道恁麼咄經有經師論有論師不干山僧事咄大丈夫當時下得一轉語不唯截斷南泉亦乃與天下衲僧出氣召大夫云時人見此一株花如夢相似鴛鴦繡了從君看莫把金針度與人莫寐語引得黃鶯下柳條陸亘大夫久參南泉尋常留心於理性中游泳肇論一日坐次遂拈此兩句以為奇特問云肇法師道天地與我同根萬物與我一體也甚奇怪肇法師乃晉時高僧與生融睿同在羅什門下謂之四哲幼年好讀莊老後因寫古維摩經有悟處方知莊老猶未盡善故綜諸經乃造四論莊老意謂天地形之大也我形亦爾也同生於虛無之中莊生大意只論齊物肇公大意論性皆歸自己不見他論中道夫至人空洞無象而萬物無非我造會萬物為自己者其唯聖人乎雖有神有人有賢有聖各別而皆同一性一體古人道盡乾坤大地只是一箇自己寒則普天普地寒熱則普天普地熱有則普天普地有無則普天普地無是則普天普地是非則普天普地非法眼云渠渠渠我我我南北東西皆可可不可可但唯我無不可所以道天上天下唯我獨尊石頭因看肇論至此會萬物為自己處豁然大悟後作一本參同契亦不出此意看他恁麼問且道同什麼根同那箇體到這裏也不妨奇特豈同他常人不知天之高地之厚豈有恁麼事陸亘大夫恁麼問奇則甚奇只是不出教意若道教意是極則世尊何故更拈花祖師更西來作麼南泉答處用衲僧巴鼻與他拈出痛處破他窠窟遂指庭前花召大夫云時人見此一株花如夢相似如引人向萬丈懸崖上打一推令他命斷爾若平地上推倒彌勒佛下生也只不解命斷亦如人在夢欲覺不覺被人喚醒相似南泉若是眼目不正必定被他搽糊將去看他恁麼說話也不妨難會若是眼目定動活底聞得如醍醐上味若是死底聞得翻成毒藥古人道若於事上見墮在常情若向意根下卜度卒摸索不著巖頭道此是向上人活計只露目前些子如同電拂南泉大意如此有擒虎兕定龍蛇底手腳到這裏也須是自會始得不見道向上一路千聖不傳學者勞形如猿捉影看他雪竇頌出聞見覺知非一一森羅萬象無有一法七花八裂眼耳鼻舌身意一時是箇無孔鐵鎚山河不在鏡中觀我這裏無這箇消息長者自長短者自短青是青黃是黃爾向什麼處觀霜天月落夜將半引爾入草了也遍界不曾藏切忌向鬼窟裏坐誰共澄潭照影寒有麼有麼若不同床睡焉知被底穿愁人莫向愁人說說向愁人愁殺人南泉小睡語雪竇大睡語雖然作夢却作得箇好夢前頭說一體這裏說不同聞見覺知非一一山河不在鏡中觀若道在鏡中觀然後方曉了則不離鏡處山河大地草木叢林莫將鏡鑑若將鏡鑑便為兩段但只可山是山水是水法法住法位世間相常住山河不在鏡中觀且道向什麼處觀還會麼到這裏向霜天月落夜將半這邊與爾打併了也那邊爾自相度還知雪竇以本分事為人麼誰共澄潭照影寒為復自照為復共人照須是絶機絶解方到這境界即今也不要澄潭也不待霜天月落即今作麼生
