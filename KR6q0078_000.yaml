front:
  text: 碧巖録序至聖命脈列祖大機換骨靈方頤神妙術其惟雪竇禪師具超宗越格正眼提掇正令不露風規秉烹佛煅祖鉗鎚頌出衲僧向上巴鼻銀山鐵壁孰敢鑽研蚊咬鐵牛難為下口不逢大匠焉悉玄微粵有佛果老人住碧巖日學者迷而請益老人愍以垂慈剔抉淵源剖析底理當陽直指豈立見知百則公案從頭一串穿來一隊老漢次第總將按過須知趙璧本無瑕纇相如謾誑秦王至道實乎無言宗師垂慈救弊儻如是見方知徹底老婆其或泥句沈言未免滅佛種族普照幸親師席得聞未聞道友集成簡編鄙拙敘其本末時建炎戊申暮春晦日參學嗣祖比丘普照謹序自四十二章經入中國始知有佛自達磨至六祖傳衣始有言句曰本來無一物為南宗曰時時勤拂拭為北宗於是有禪宗頌古行世其徒有翻案法呵佛罵祖無所不為間有深得吾詩家活法者然所謂第一義焉用言句雪竇圜悟老婆心切大慧已一炬丙之矣嵎中張煒明遠燃死灰復板行亦所謂老婆心切者歟大德四年庚子四月初八日癸丑紫陽山方回萬里序碧巖集者圜悟大師之所述也其大弟子大慧禪師乃焚棄其書世間種種法皆忌執著釋子所歸敬莫如佛猶有時而罵之蓋有我而無彼由我而不由彼也舍己徇物必至於失己夫心與道一道與萬物一充滿太虛何適而非道第常人觀之能見其所見而不見其所不見求之於人而人語之如東坡日喻之説往復推測愈遠愈失自吾夫子體道猶欲無言而況佛氏為出世間法而可文字言語而求之哉雖然亦有不可廢者智者少而愚者多已學者少未學者多大藏經五千餘卷盡為未來世設苟可以忘言釋迦老子便當閉口何至如是叨叨天下之理固有不離尋常之中而超出於尋常之表雖若易知而實未易知者不求之於人則終身不可得古者名世之人非千人之英則萬人之傑也太阿之劍天下之利劍也登山則戮虎豹入水則剸蛟龍人之知之盡於是已然古人有善用之者乘城而戰順風而揮之三軍為之大敗流血赭乎千里是豈可以一己之所能而盡疑之哉自吾聞有是書求之甚至嵎中張氏始更刻木來謀於豫遂贊而成之且為題其首大德九年歲乙巳三月吉日玉岑休休居士聊城周馳書於錢唐觀橋寓舍或問碧巖集之成毀孰是乎曰皆是也齴齲來東單傳心印不立文字固也而血脈歸空諸論果誰為之哉古謂不在文字不離文字者真知言已使人人於卷簾聞板竪指觸腳之際了却大事文字何有哉拈花微笑以來門竿倒却之後才涉言句非文字無以傳是又不可廢者也嘗謂祖教之書謂之公案者倡於唐而盛於宋其來尚矣二字乃世間法中吏牘語其用有三面壁功成行腳事了定槃之星難明野狐之趣易墮具眼為之勘辨一呵一喝要見實詣如老吏據獄讞罪底裏悉見情欵不遺一也其次則嶺南初來西江未吸亡羊之岐易泣指海之針必南悲心為之接引一棒一痕要令證悟如廷尉執法平反出人於死二也又其次則犯稼憂深繫驢事重學奕之志須專染絲之色易悲大善知識為之付囑俾之心死蒲團一動一參如官府頒示條令令人讀律知法惡念才生旋即寢滅三也具方册作案底陳機境為格令與世間所謂金科玉條清明對越諸書初何以異祖師所以立為公案留示叢林者意或取此奈何末法以來求妙心於瘡紙付正法於口談點盡鬼神猶不離簿傍人門戶任喚作郎劍去矣而舟猶刻兔逸矣而株不移滿肚葛藤能問千轉其於生死大事初無干涉鐘鳴漏盡將焉用之烏乎羚羊挂角未可以形迹求而善學下慧者豈步亦步趨亦趨哉知此則二老之心皆是矣圜悟顧子念孫之心多故重拈雪竇頌大慧救焚拯溺之心多故立毀碧巖集釋氏説一大藏經末後乃謂不曾説一字豈欺我哉圜悟之心釋氏説經之心也大慧之心釋氏諱説之心也禹稷顏子易地皆然推之挽之主於車行而已爾來二百餘年嵎中張明遠復鏤梓以壽其傳豈祖教回春乎抑世故有數乎然是書之行所關甚重若見水即海認指作月不特大慧憂之而圜悟又將為之去粘解縛矣昔人寫照之詩曰分明紙上張公子盡力高聲喚不譍欲觀此書先參此語大德甲辰四月望三教老人書
