body:
  text: 垂示云是非交結處聖亦不能知逆順縱橫時佛亦不能辨為絶世超倫之士顯逸群大士之能向氷凌上行劍刃上走直下如麒麟頭角似火裏蓮花宛見超方始知同道誰是好手者試舉看四一舉趙州問投子大死底人却活時如何有恁麼事賊不打貧兒家慣曾作客方憐客投子云不許夜行投明須到看樓打樓是賊識賊若不同床臥焉知被底穿趙州問投子大死底人却活時如何投子對他道不許夜行投明須到且道是什麼時節無孔笛撞著氈拍版此謂之驗主問亦謂之心行問投子趙州諸方皆美之得逸群之辨二老雖承嗣不同看他機鋒相投一船投子一日為趙州置茶筵相待自過蒸餅與趙州州不管投子令行者過胡餅與趙州州禮行者三拜且道他意是如何看他盡是向根本上提此本分事為人有僧問如何是道答云道如何是佛答云佛又問金鎖未開時如何答云開金雞未鳴時如何答云無這箇音響鳴後如何答云各自知時投子平生問答總如此看趙州問大死底人却活時如何他便道不許夜行投明須到直下如擊石火似閃電光還他向上人始得大死底人都無佛法道理玄妙得失是非長短到這裏只恁麼休去古人謂之平地上死人無數過得荊棘林是好手也須是透過那邊始得雖然如是如今人到這般田地早是難得或若有依倚有解會則沒交涉哲和尚謂之見不淨潔五祖先師謂之命根不斷須是大死一番却活始得浙中永光和尚道言鋒若差鄉關萬里直須懸崖撒手自肯承當絶後再蘇欺君不得非常之旨人焉廋哉趙州問意如此投子是作家亦不辜負他所問只是絶情絶迹不妨難會只露面前些子所以古人道欲得親切莫將問來問問在答處答在問處若非投子被趙州一問也大難酬對只為他是作家漢舉著便知落處頌云廋所留反匿也活中有眼還同死兩不相知翻來覆去若不蘊藉爭辨得這漢緇素藥忌何須鑒作家若不驗過爭辨端的遇著試與一鑒又且何妨也要問過古佛尚言會未到賴是有伴千聖也不傳山僧亦不知不知誰解撒塵沙即今也不少開眼也著合眼也著闍黎恁麼舉落在什麼處活中有眼還同死雪竇是知有底人所以敢頌古人道他參活句不參死句雪竇道活中有眼還同於死漢相似何曾死死中具眼如同活人古人道殺盡死人方見活人活盡死人方見死人趙州是活底人故作死問驗取投子如藥性所忌之物故將去試驗相似所以雪竇道藥忌何須鑒作家此頌趙州問處後面頌投子古佛尚言曾未到只這大死底人却活處古佛亦不曾到天下老和尚亦不曾到任是釋迦老子碧眼胡僧也須再參始得所以道只許老胡知不許老胡會雪竇道不知誰解撒塵沙不見僧問長慶如何是善知識眼慶云有願不撒沙保福云不可更撒也天下老和尚據曲彔木床上行棒行喝竪拂敲床現神通作主宰盡是撒沙且道如何免得垂示云單提獨弄帶水拖泥敲唱俱行銀山鐵壁擬議則髑髏前見鬼尋思則黑山下打坐明明杲日麗天颯颯清風匝地且道古人還有誵訛處麼試舉看四二舉龐居士辭藥山這老漢作怪也山命十人禪客相送至門首也不輕他是什麼境界也須是識端倪底衲僧始得居士指空中雪云好雪片片不落別處無風起浪指頭有眼這老漢言中有響時有全禪客云落在什麼處中也相隨來也果然上鈎來士打一掌著果然勾賊破家全云居士也不得草草棺木裏瞪眼士云汝恁麼稱禪客閻老子未放汝在第二杓惡水潑了何止閻老子山僧這裏也不放過全云居士作麼生心不改又是要喫棒這僧從頭到尾不著便士又打一掌果然雪上加霜喫棒了呈欵云眼見如盲口説如啞更有斷和句又與他讀判語雪竇別云初問處但握雪團便打是則是賊過後張弓也漏逗不少雖然如是要見箭鋒相拄爭奈落在鬼窟裏了也龐居士參馬祖石頭兩處有頌初見石頭便問不與萬法為侶是什麼人聲未斷被石頭掩却口有箇省處作頌道日用事無別唯吾自偶諧頭頭非取捨處處沒張乖朱紫誰為號青山絶點埃神通并妙用運水及搬柴後參馬祖又問不與萬法為侶是什麼人祖云待爾一口吸盡西江水即向汝道士豁然大悟作頌云十方同聚會箇箇學無為此是選佛場心空及第歸為他是作家後列剎相望所至競譽到藥山盤桓既久遂辭藥山山至重他命十人禪客相送是時值雪下居士指雪云好雪片片不落別處全禪客云落在什麼處士便掌全禪客既不能行令居士令行一半令雖行全禪客恁麼酬對也不是他不知落處各有機鋒卷舒不同然有不到居士處所以落他架下難出他彀中居士打了更與説道理云眼見如盲口説如啞雪竇別前語云初問處但握雪團便打雪竇恁麼要不辜他問端只是機遲慶藏主道居士機如掣電等爾握雪團到幾時和聲便應和聲打方始勦絶雪竇自頌他打處云彀古豆切張弓弩也弓滿也雪團打雪團打爭奈落在第二機不勞拈出頭上漫漫腳下漫漫龐老機關沒可把往往有人不知只恐不恁麼天上人間不自知是什麼消息雪竇還知麼眼裏耳裏絶瀟灑箭鋒相拄眼見如盲口説如啞瀟灑絶作麼生向什麼處見龐老與雪竇碧眼胡僧難辨別達磨出來向爾道什麼打云闍𥠖道什麼一坑理却雪團打雪團打龐老機關沒可把雪竇要在居士頭上行古人以雪明一色邊事雪竇意道當時若握雪團打時居士縱有如何機關亦難搆得雪竇自誇他打處殊不知有落節處天上人間不自知眼裏耳裏絶瀟灑眼裏也是雪耳裏也是雪正住在一色邊亦謂之普賢境界一色邊事亦謂之打成一片雲門道直得盡乾坤大地無纖毫過患猶為轉句不見一色始是半提若要全提須知有向上一路始得到這裏須是大用現前針劄不入不聽他人處分所以道他參活句不參死句古人道一句合頭語萬劫繫驢橛有什麼用處雪竇到此頌殺了復轉機道只此瀟灑絶直饒是碧眼胡僧也難辨別碧眼胡僧尚難辨別更教山僧説箇什麼垂示云定乾坤句萬世共遵擒虎兕機千聖莫辨直下更無纖翳全機隨處齊彰要明向上鉗鎚須是作家爐韛且道從上來還有恁麼家風也無試舉看四三舉僧問洞山寒暑到來如何回避不是這箇時節劈頭劈面在什麼處山云何不向無寒暑處去天下人尋不得藏身露影蕭何賣却假銀城僧云如何是無寒暑處賺殺一船人隨他轉也一釣便上山云寒時寒殺闍黎熱時熱殺闍黎真不掩偽曲不藏直臨崖看虎兕特地一場愁掀翻大海踢倒須彌且道洞山在什麼處黃龍新和尚拈云洞山袖頭打領腋下襟爭奈這僧不甘如今有箇出來問黃龍且道如何支遣良久云安禪不必須山水滅却心頭火自涼諸人且道洞山圈繢落在什麼處若明辨得始知洞山下五位回互正偏接人不妨奇特到這向上境界方能如此不消安排自然恰好所以道正中偏三更初夜月明前莫怪相逢不相識隱隱猶懷舊日嫌偏中正失曉老婆逢古鏡分明覿面更無真休更迷頭還認影正中來無中有路出塵埃但能不觸當今諱也勝前朝斷舌才偏中至兩刃交鋒不須避好手還同火裏蓮宛然自有衝天氣兼中到不落有無誰敢和人人盡欲出常流折合還歸炭裏坐浮山遠録公以此公案為五位之格若會得一則餘者自然易會巖頭道如水上葫蘆子相似捺著便轉殊不消絲毫氣力曾有僧問洞山文殊普賢來參時如何山云趕向水牯牛群裏去僧云和尚入地獄如箭山云全得他力洞山道何不向無寒暑處去此是偏中正僧云如何是無寒暑處山云寒時寒殺闍黎熱時熱殺闍黎此是正中偏雖正却偏雖偏却圓曹洞録中備載子細若是臨濟下無許多事這般公案直下便會有者道大好無寒暑有什麼巴鼻古人道若向劍刃上走則快若向情識上見則遲不見僧問翠微如何是祖師西來意微云待無人來向爾道遂入園中行僧云此間無人請和尚道微指竹云這一竿竹得恁麼長那一竿竹得恁麼短其僧忽然大悟又曹山問僧恁麼熱向什麼處回避僧云鑊湯爐炭裏回避山云鑊湯爐炭裏如何回避僧云衆苦不能到看他家裏人自然會他家裏人説話雪竇用他家裏事頌出垂手還同萬仞崖不是作家誰能辨得何處不圓融王敕既行諸侯避道正偏何必在安排若是安排何處有今日作麼生兩頭不涉風行草傴水到渠成琉璃古殿照明月圓陀陀地切忌認影且莫當頭忍俊韓獹空上階不是這回蹉過了也逐塊作什麼打云爾與這僧同參獹龍都切通作盧曹洞下有出世不出世有垂手不垂手若不出世目視雲霄若出世便灰頭土面目視雲霄即是萬仞峯頭灰頭土面即是垂手邊事有時灰頭土面即在萬仞峯頭有時萬仞峯頭即是灰頭土面其實入鄽垂手與孤峯獨立一般歸源了性與差別智無異切忌作兩橛會所以道垂手還同萬仞崖直是無爾湊泊處正偏何必在安排若到用時自然如此不在安排也此頌洞山答處後面道琉璃古殿照明月忍俊韓獹空上階此正頌這僧逐言語走洞下有此石女木馬無底籃夜明珠死蛇等十八般大綱只明正位如月照琉璃古殿似有圓影洞山答道何不向無寒暑處去其僧一似韓獹逐塊連忙上階捉其月影相似又問如何是無寒暑處山云寒時寒殺闍黎熱時熱殺闍黎如韓獹逐塊走到階上又却不見月影韓獹乃出戰國策云韓氏之獹駿狗也中山之兔狡兔也是其獹方能尋其兔雪竇引以喻這僧也只如諸人還識洞山為人處麼良久云討甚兔子四四舉禾山垂語云習學謂之聞絶學謂之鄰天下衲僧跳不出無孔鐵鎚一箇鐵橛子過此二者是為真過頂門上具一隻眼作什麼僧出問如何是真過道什麼一筆勾下有一箇鐵橛子山云解打鼓鐵橛鐵蒺藜確確又問如何是真諦道什麼兩重公案又有一箇鐵橛子山云解打鼓鐵橛鐵蒺藜確確又問即心即佛即不問如何是非心非佛道什麼這箇丘圾堆三段不同又一箇鐵蒺藜子山云解打鼓鐵橛鐵蒺藜確確又問向上人來時如何接道什麼遭他第四杓惡水來也又有一箇鐵橛子山云解打鼓鐵橛鐵蒺藜確確且道落在什麼處朝到西天暮歸東土禾山垂示云習學謂之聞絶學謂之鄰過此二者是為真過此一則語出寶藏論學至無學謂之絶學所以道淺聞深悟深聞不悟謂之絶學一宿覺道吾早年來積學問亦曾討疏尋經論習學既盡謂之絶學無為間道人及至絶學方始與道相近直得過此二學是謂真過其僧也不妨明敏便拈此語問禾山山云解打鼓所謂言無味語無味欲明這箇公案須是向上人方能見此語不涉理性亦無議論處直下便會如桶底脫相似方是衲僧安穩處始契得祖師西來意所以雲門道雪峯輥毬禾山打鼓國師水碗趙州喫茶盡是向上拈提又問如何是真諦山云解打鼓真諦更不立一法若是俗諦萬物俱備真俗無二是聖諦第一義又問即心即佛即不問如何是非心非佛山云解打鼓即心即佛即易求若到非心非佛即難少有人到又問向上人來時如何接山云解打鼓向上人即是透脫灑落底人此四句語諸方以為宗旨謂之禾山四打鼓只如僧問鏡清新年頭還有佛法也無清云有僧云如何是新年頭佛法清云元正啓祚萬物咸新僧云謝師答話清云老僧今日失利似此答話有十八般失利又僧問淨果大師鶴立孤松時如何果云腳底下一場懡㦬又問雪覆千山時如何果云日出後一場懡㦬又問會昌沙汰時護法神向什麼處去果云三門外兩箇漢一場懡㦬諸方謂之三懡㦬又保福問僧殿裏是什麼佛僧云和尚定當看福云釋迦老子僧云莫瞞人好福云却是爾瞞我又問僧云爾名什麼僧云咸澤福云或遇枯涸時如何僧云誰是枯涸者福云我僧云和尚莫瞞人好福云却是爾瞞我又問僧爾作什麼業喫得恁麼大僧云和尚也不小福作蹲身勢僧云和尚莫瞞人好福云却是爾瞞我又問浴主浴鍋闊多少主云請和尚量看福作量勢主云和尚莫瞞人好福云却是爾瞞我諸方謂之保福四瞞人又如雪峯四漆桶皆是從上宗師各出深妙之旨接人之機雪竇後面引一落索依雲門示衆頌出此公案一拽石寰中天子敕癩兒牽伴向上人恁麼來二般土塞外將軍令兩箇一狀領過同病相憐發機須是千鈞弩若是千鈞也透不得不可輕酬豈為死蝦蟆象骨老師曾輥毬也有人曾恁麼來有箇無孔鐵鎚阿誰不知爭似禾山解打鼓鐵橛子須還這老漢始得一子親得報君知雪竇也未夢見在雪上加霜爾還知麼莫莽鹵也有些子儱儱侗侗甜者甜兮苦者苦謝答話錯下注腳好與三十棒喫棒得也未便打依舊黑漫漫歸宗一日普請拽石宗問維那什麼處去維那云拽石去宗云石且從汝拽即不得動著中心樹子木平凡有新到至先令般三轉土木平有頌示衆云東山路窄西山低新到莫辭三轉泥嗟汝在途經日久明明不曉却成迷後來有僧問云三轉內即不問三轉外事作麼生平云鐵輪天子寰中敕僧無語平便打所以道一拽石二般土發機須是千鈞弩雪竇以千鈞之弩喻此話要見他為人處三十斤為一鈞一千鈞則三萬斤若是獰龍虎狼猛獸方用此弩若是鷦鷯小可之物必不可輕發所以千鈞之弩不為鼷鼠而發機象骨老師曾輥毬即雪峯一日見玄沙來三箇木毬一齊輥玄沙便作斫牌勢雪峯深肯之雖然總是全機大用處俱不如禾山解打鼓多少徑截只是難會所以雪竇道爭似禾山解打鼓又恐人只在話頭上作活計不知來由莽莽鹵鹵所以道報君知莫莽鹵也須是實到這般田地始得若要不莽鹵甜者甜兮苦者苦雪竇雖然如是拈弄畢竟也跳不出垂示云要道便道舉世無雙當行即行全機不讓如擊石火似閃電光疾焰過風奔流度刃拈起向上鉗鎚未免亡鋒結舌放一線道試舉看四五舉僧問趙州萬法歸一一歸何處拶著這老漢堆山積嶽切忌向鬼窟裏作活計州云我在青州作一領布衫重七斤果然七縱八橫拽却漫天網還見趙州麼衲僧鼻孔曾拈得還知趙州落處麼若這裏見得便乃天上天下唯我獨尊水到渠成風行草偃苟或未然老僧在爾腳跟下若向一擊便行處會去天下老和尚鼻孔一時穿却不奈爾何自然水到渠成苟或躊躇老僧在爾腳跟下佛法省要處言不在多語不在繁只如這僧問趙州萬法歸一一歸何處他却答道我在青州作一領布衫重七斤若向語句上辨錯認定盤星不向語句上辨爭奈却恁麼道這箇公案雖難見却易會雖易會却難見難則銀山鐵壁易則直下惺惺無爾計較是非處此話與普化道來日大悲院裏有齋話更無兩般一日僧問趙州如何是祖師西來意州云庭前柏樹子僧云和尚莫將境示人州云老僧不曾將境示人看他恁麼向極則轉不得處轉得自然蓋天蓋地若轉不得觸途成滯且道他有佛法商量也無若道他有佛法他又何曾説心説性説玄説妙若道他無佛法旨趣他又不曾辜負爾問頭豈不見僧問木平和尚如何是佛法大意平云這箇冬瓜如許大又僧問古德深山懸崖逈絶無人處還有佛法也無古德云有僧云如何是深山裏佛法古德云石頭大底大小底小看這般公案誵訛在什麼處雪竇知他落處故打開義路與爾頌出編辟曾挨老古錐何必拶著這老漢挨拶向什麼處去七斤衫重幾人知再來不直半分錢直得口似匾擔又却被他贏得一籌如今拋擲西湖裏還雪竇手腳始得山僧也不要下載清風付與誰自古自今且道雪竇與他酬唱與他下注腳一子親得十八問中此謂之編辟問雪竇道編辟曾挨老古錐編辟萬法教歸一致這僧要挨拶他趙州州也不妨作家向轉不得處有出身之路敢開大口便道我在青州作一領布衫重七斤雪竇道這箇七斤布衫能有幾人知如今拋擲西湖裏萬法歸一一亦不要七斤布衫亦不要一時拋在西湖裏雪竇住洞庭翠峯有西湖也下載清風付與誰此是趙州示衆爾若向北來與爾上載爾若向南來與爾下載爾若從雪峯雲居來也是箇擔板漢雪竇道如此清風堪付阿誰上載者與爾説心説性説玄説妙種種方便若是下載更無許多義理玄妙有底擔一擔禪到趙州處一點也使不著一時與他打疊教灑灑落落無一星事謂之悟了還同未悟時如今人盡作無事會有底道無迷無悟不要更求只如佛未出世時達磨未來此土時不可不恁麼也用佛出世作什麼祖師更西來作什麼總如此有什麼干涉也須是大徹大悟了依舊山是山水是水乃至一切萬法悉皆成現方始作箇無事底人不見龍牙道學道先須有悟由還如曾鬪快龍舟雖然舊閣間田地一度贏來方始休只如趙州這箇七斤布衫話子看他古人恁麼道如金如玉山僧恁麼説諸人恁麼聽總是上載且道作麼生是下載三條椽下看取垂示云一槌便成超凡越聖片言可折去縛解粘如氷凌上行劍刃上走聲色堆裏坐聲色頭上行縱橫妙用則且置剎那便去時如何試舉看四六舉鏡清問僧門外是什麼聲等間垂一釣不患聾問什麼僧云雨滴聲不妨實頭也好箇消息清云衆生顛倒迷己逐物事生也慣得其便鐃鈎搭索還他本分手腳僧云和尚作麼生果然納敗缺轉槍來也不妨難當却把槍頭倒刺人清云洎不迷己咄直得分疏不下僧云洎不迷己意旨如何拶著這老漢逼殺人前箭猶輕後箭深清云出身猶可易脫體道應難養子之緣雖然如是德山臨濟向什麼處去不喚作雨滴聲喚作什麼聲直得分疏不下洎巨至切及也只這裏也好薦取古人垂示一機一境要接人一日鏡清問僧門外是什麼聲僧云雨滴聲清云衆生顛倒迷己逐物又問門外什麼聲僧云鵓鳩聲清云欲得不招為間業莫謗如來正法輪又問門外什麼聲僧云蛇咬蝦蟆聲清云將謂衆生苦更有苦衆生此語與前頭公案更無兩般衲僧家於這裏透得去於聲色堆裏不妨自由若透不得便被聲色所拘這般公案諸方謂之煅煉語若是煅煉只成心行不見他古人為人處亦喚作透聲色一明道眼二明聲色三明心宗四明忘情五明展演然不妨子細爭奈有窠臼在鏡清恁麼問門外什麼聲僧云雨滴聲却道衆生顛倒迷己逐物人皆錯會喚作故意轉人且得沒交涉殊不知鏡清有為人底手腳膽大不抅一機一境忒殺不惜眉毛鏡清豈不知是雨滴聲何消更問須知古人以探竿影草要驗這僧這僧也善挨拶便道和尚又作麼生直得鏡清入泥入水向他道洎不迷己其僧迷己逐物則故是鏡清為什麼也迷己須知驗他句中便有出身處這僧太懞懂要勦絶此話更問道只箇洎不迷己意旨如何若是德山臨濟門下棒喝已行鏡清通一線道隨他打葛藤更向他道出身猶可易脫體道應難雖然恁麼古人道相續也大難他鏡清只一句便與這僧明腳跟下大事雪竇頌云虛堂雨滴聲從來無間斷大家在這裏作者難酬對果然不知山僧從來不是作者有權有實有放有收殺活擒縱若謂曾入流刺頭入膠盆不喚作雨滿聲喚作什麼聲依前還不會山僧幾曾問爾來這漆桶還我無孔鐵鎚來曾不會兩頭坐斷兩處不分不在這兩邊南山北山轉𩃎霈頭上腳下若喚作雨聲則瞎不喚作雨聲喚作什麼聲到這裏須是腳踏實地始得虛堂雨滴聲作者難酬對若喚作雨聲則是迷己逐物不喚作雨聲又如何轉物到這裏任是作者也難酬對所以古人道見與師齊減師半德見過於師方堪傳授又南院道棒下無生忍臨機不讓師若謂曾入流依前還不會教中道初於聞中入流忘所所入既寂動靜二相了然不生若道是雨滴聲也不是若道不是雨滴聲也不是前頭頌兩喝與三喝作者知機變正類此頌若道是入聲色之流也不是若喚作聲色依前不會他意譬如以指指月月不是指會與不會南山北山轉𩃎霈也垂示云天何言哉四時行焉地何言哉萬物生焉向四時行處可以見體於萬物生處可以見用且道向什麼處見得衲僧離却言語動用行住坐臥併却咽喉唇吻還辨得麼四七舉僧問雲門如何是法身多少人疑著千聖跳不出漏逗不少門云六不收斬釘截鐵八角磨盤空裏走靈龜曳尾朕兆未分時薦得已是第二頭朕兆已生後薦得又落第三首若更向言語上辨得且喜沒交涉雲門道六不收直是難搆若向朕兆未分時搆得已是第二頭若向朕兆已生後薦得又落第三首若向言句上辨明卒摸索不著且畢竟以何為法身若是作家底聊聞舉著剔起便行苟或佇思停機伏聽處分太原孚上座本為講師一日登座講次説法身云竪窮三際橫亘十方有一禪客在座下聞之失笑孚下座云某甲適來有甚短處願禪者為説看禪者云座主只講得法身量邊事不見法身孚云畢竟如何即是禪者云可暫罷講於靜室中坐必得自見孚如其言一夜靜坐忽聞打五更鐘忽然大悟遂敲禪者門云我會也禪者云爾試道看孚云我從今日去更不將父母所生鼻孔扭揑也又教中道佛真法身猶若虛空應物現形如水中月又僧問夾山如何是法身山云法身無相如何是法眼山云法眼無瑕雲門道六不收此公案有者道只是六根六塵六識此六皆從法身生六根收他不得若恁麼情解且喜沒交涉更帶纍雲門要見便見無爾穿鑿處不見教中道是法非思量分別之所能解他答話多惹人情解所以一句中須具三句更不辜負爾問頭應時應節一言一句一點一畫不妨有出身處所以道一句透千句萬句一時透且道是法身是祖師放爾三十棒雪竇頌云一二三四五六周而復始滴水滴凍費許多工夫作什麼碧眼胡僧數不足三生六十劫達磨何曾夢見闍黎為什麼知而故犯少林謾道付神光一人傳虗萬人傳實從頭來已錯了也卷衣又説歸天竺賺殺一船人懡㦬不少天竺茫茫無處尋在什麼處始是太平如今在什麼處夜來却對乳峯宿刺破爾眼睛也是無風起浪且道是法身是佛身放爾三十棒雪竇善能於無縫罅處出眼目頌出教人見雲門道六不收雪竇為什麼却道一二三四五六直是碧眼胡僧也數不足所以道只許老胡知不許老胡會須是還他屋裏兒孫始得適來道一言一句應時應節若透得去方知道不在言句中其或未然不免作情解五祖老師道釋迦牟尼佛下賤客作兒庭前柏樹子一二三四五若向雲門言句下諦當見得相次到這境界少林謾道付神光二祖始名神光及至後來又道歸天竺達磨葬於熊耳山之下時宋雲奉使西歸在西嶺見達磨手携隻履歸西天去使回奏聖開墳惟見遺下一隻履雪竇道其實此事作麼生分付既無分付卷衣又説歸天竺且道為什麼此土却有二三遞相恁麼傳來這裏不妨誵訛也須是搆得始可入作天竺茫茫無處尋夜來却對乳峯宿且道即今在什麼處師便打云瞎四八舉王太傅入招慶煎茶作家相聚須有奇特等間無事大家著一隻眼惹禍來也時朗上座與明招把銚一火弄泥團漢不會煎茶帶纍別人朗翻却茶銚事生也果然太傅見問上座茶爐下是什麼果然禍事朗云捧爐神果然中他箭了也不妨奇特太傅云既是捧爐神為什麼翻却茶銚何不與他本分草料事生也朗云仕官千日失在一朝錯指注是什麼語話杜撰禪和如麻似粟太傅拂袖便去灼然作家許他具一隻眼明招云朗上座喫却招慶飯了却去江外打野榸更與三十棒這獨眼龍只具一隻眼也須是明眼人點破始得朗云和尚作麼生拶著也好與一拶終不作這般死郎當見解招云非人得其便果然只具一隻眼道得一半一手擡一手搦雪竇云當時但踏倒茶爐爭奈賊過後張弓雖然如是也未稱德山門下客一等是潑郎潑賴就中奇特榸椿皆切枯木根欲知佛性義當觀時節因緣王太傅知泉州久參招慶一日因入寺時朗上座煎茶次翻却茶銚太傅也是箇作家才見他翻却茶銚便問上座茶爐下是什麼朗云捧爐神不妨言中有響爭奈首尾相違失却宗旨傷鋒犯手不惟辜負自己亦且觸忤他人這箇雖是無得失底事若拈起來依舊有親疏有皂白若論此事不在言句上却要向言句上辨箇活處所以道他參活句不參死句據朗上座恁麼道如狂狗逐塊太傅拂袖便去似不肯他明招云朗上座喫却招慶飯了却去江外打野榸野榸即是荒野中火燒底木橛謂之野榸用明朗上座不向正處行却向外邊走朗拶云和尚又作麼生招云非人得其便明招自然有出身處亦不辜負他所問所以道俊狗咬人不露牙溈山哲和尚云王太傅大似相如奪璧直得鬚鬢衡冠蓋明招忍俊不禁難逢其便大溈若作朗上座見他太傅拂袖便行放下茶銚呵呵大笑何故見之不取千載難逢不見寶壽問胡釘鉸云久聞胡釘鉸莫便是否胡云是壽云還釘得虛空麼胡云請師打破將來壽便打胡不肯壽云異日自有多口阿師為爾點破在胡後見趙州舉似前話州云爾因什麼被他打胡云不知過在什麼處州云只這一縫尚不奈何更教他打破虛空來胡便休去州代云且釘這一縫胡於是有省京兆米七師行腳歸有老宿問云月夜斷井索人皆喚作蛇未審七師見佛時喚作什麼七師云若有所見即同衆生老宿云也是千年桃核忠國師問紫璘供奉聞説供奉解注思益經是否奉云是師云凡當注經須解佛意始得奉云若不會意爭敢言注經師遂令侍者將一碗水七粒米一隻筯在碗上送與供奉問云是什麼義奉云不會師云老師意尚不會更説甚佛意王太傅與朗上座如此話會不一雪竇末後却道當時但與踏倒茶爐明招雖是如此終不如雪竇雪峯在洞山會下作飯頭一日淘米次山問作什麼峯云淘米山云淘米去沙淘沙去米峯云沙米一時去山云大衆喫箇什麼峯便覆却盆山云子因緣不在此雖然恁麼爭似雪竇云當時但踏倒茶爐一等是什麼時節到他用處自然騰今煥古有活脫處頌云來問若成風箭不虛發偶爾成文不妨要妙應機非善巧弄泥團漢有什麼限方木逗圓孔不妨撞著作家堪悲獨眼龍只具一雙眼只得一橛曾未呈牙爪也無牙爪可呈説什麼牙爪也不得欺他牙爪開爾還見麼雪竇却較些子若有恁麼手腳踏倒茶爐生雲雷盡大地人一時喫棒天下衲僧無著身處旱天霹靂逆水之波經幾回七十二棒翻成一百五十來問若成風應機非善巧太傅問處似運斤成風此出莊子郢人泥壁餘一少竅遂圓泥擲補之時有少泥落在鼻端傍有匠者云公補竅甚巧我運斤為爾取鼻端泥其鼻端泥若蠅子翼使匠者斫之匠者運斤成風而斫之盡其泥而不傷鼻郢人立不失容所謂二俱巧妙朗上座雖應其機語無善巧所以雪竇道來問若成風應機非善巧堪悲獨眼龍曾未呈牙爪明招道得也太奇特爭奈未有拏雲攫霧底爪牙雪竇傍不肯忍俊不禁代他出氣雪竇暗去合他意自頌他踏倒茶爐語牙爪開生雲雷逆水之波經幾回雲門道不望爾有逆水之波但有順水之意亦得所以道活句下薦得永劫不妄朗上座與明招語句似死若要見活處但看雪竇踏倒茶爐垂示云七穿八穴攙鼓奪旗百匝千重瞻前顧後踞虎頭收虎尾未是作家牛頭沒馬頭回亦未為奇特且道過量底人來時如何試舉看四九舉三聖問雪峯透網金鱗未審以何為食不妨縱橫自在此問太高生爾合只自知何必更問峯云待汝出網來向汝道減人多少聲價作家宗師天然自在聖云一千五百人善知識話頭也不識迅雷霹靂可殺驚群一任𨁝跳峯云老僧住持事繁不在勝負放過一著此語最毒雪峯三聖雖然一出一入一挨一拶未分勝負在且道這二尊宿具什麼眼目三聖自臨濟受訣遍歷諸方皆以高賓待之看他致箇問端多少人摸索不著且不涉理性佛法却問道透網金鱗以何為食且道他意作麼生透網金鱗尋常既不食他香餌不知以什麼為食雪峯是作家匹似間只以一二分酬他却向他道待汝出網來向汝道汾陽謂之呈解問洞下謂之借事問須是超倫絶類得大受用頂門有眼方謂之透網金鱗爭奈雪峯是作家不妨減人聲價却云待汝出網來向汝道看他兩家把定封疆壁立萬仞若不是三聖只此一句便去不得爭奈三聖亦是作家方解向他道一千五百人善知識話頭也不識雪峯却道老僧住持事繁此語得恁麼頑慢他作家相見一擒一縱逢強即弱遇賤即貴爾若作勝負會未夢見雪峯在看他二人最初孤危峭峻末後二俱死郎當且道還有得失勝負麼他作家酬唱必不知此三聖在臨濟作院主臨濟遷化垂示云吾去後不得滅吾正法眼藏三聖出云爭敢滅却和尚正法眼藏濟云已後有人問爾作麼生三聖便喝濟云誰知吾正法眼藏向這瞎驢邊滅却三聖便禮拜他是臨濟真子方敢如此酬唱雪竇末後只頌透網金鱗顯他作家相見處頌云透網金鱗千兵易得一將難求何似生千聖不奈何休云滯水向他雲外立活潑潑地且莫鈍置好搖乾蕩坤作家作家未是他奇特處放出又何妨振鬣擺尾誰敢辨端倪做得箇伎倆賣弄出來不妨驚群千尺鯨噴洪浪飛轉過那邊去不妨奇特盡大地人一口吞盡一聲雷震清飈起有眼有耳如聾如盲誰不悚然清飈起在什麼處咄天上人間知幾幾雪峰牢把陳頭三聖牢把陳腳撒土撒沙作什麼打云爾在什麼處透網金鱗休云滯水五祖道只此一句頌了也既是透網金鱗豈居滯水必在洪波浩渺白浪滔天處且道二六時中以何為食諸人且向三條椽下七尺單前試定當看雪竇道此事隨分拈弄如金鱗之類振鬣擺尾時直得乾坤動搖千尺鯨噴洪浪飛此頌三聖道一千五百人善知識話頭也不識如鯨噴洪浪相似一聲雷震清飈起頌雪峯道老僧住持事繁如一聲雷震清飈起相似大綱頌他兩箇俱是作家清飈起天上人間知幾幾且道這一句落在什麼處飈者風也當清飈起時天上人間能有幾人知垂示云度越階級超絶方便機機相應句句相投儻非入大解脫門得大解脫用何以權衡佛祖龜鑑宗乘且道當機直截逆順縱橫如何道得出身句試請舉看五舉僧問雲門如何是塵塵三昧天下衲僧盡在這裏作窠窟滿口含霜撒沙撒土作什麼門云鉢裏飯桶裏水布袋著盛錐金沙混雜將錯就錯含元殿裏不問長安還定當得麼若定當得雲門鼻孔在諸人手裏若定當不得諸人鼻孔在雲門手裏雲門有斬釘截鐵句此一句中具三句有底問著便道鉢裏飯粒粒皆圓桶裏水滴滴皆顯若恁麼會且不見雲門端的為人處頌云鉢裏飯桶裏水露也撒沙撒土作什麼漱口三年始得多口阿師難下嘴縮却舌頭識法者懼為什麼却恁麼舉北斗南星位不殊喚東作西作什麼坐立儼然長者長法身短者短法身白浪滔天平地起腳下深數丈賓主互換驀然在爾頭上爾又作麼生打擬不擬蒼天蒼天咄止不止説什麼更添怨苦箇箇無裩長者子郎當不少傍觀者哂雪竇前面頌雲門對一説話道對一説太孤絶無孔鐵鎚重下楔後面又頌馬祖離四句絶百非話道藏頭白海頭黑明眼衲僧會不得若於此公案透得便見這箇頌雪竇當頭便道鉢裏飯桶裏水言中有響句裏呈機多口阿師難下嘴隨後便與爾下注腳也爾若向這裏要求玄妙道理計較轉難下嘴雪竇只到這裏也得他愛恁麼頭上先把定恐衆中有具眼者覻破也到後面須放過一著俯為初機打開頌出教人見北斗依舊在北南星依舊只在南所以道北斗南星位不殊白浪滔天平地起忽然平地上起波瀾又作麼生若向事上覷則易若向意根下尋卒摸索不著這箇如鐵橛子相似擺撥不得插嘴不得爾若擬議欲會而不會止而不止亂呈懞袋正是箇箇無裩長者子寒山詩道六極常嬰苦九維徒自論有才遺草澤無勢閉蓬門日上巖猶暗煙消谷尚昏其中長者子箇箇總無裩此集自大慧一炬之後而又重罹兵燹世鮮善刻今得蜀本校正頗完猶恐中間亥豕魯魚不無一二四方具眼高人為是正之抄録見教當復改竄俾成金美禪宗幸甚嵎中書隱白
